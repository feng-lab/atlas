package:
  name: zimg
  version: {{ datetime.datetime.today().strftime('%Y.%m.%d.%H') }}

source:
  path: ../src/3rdparty/build/conda_build

build:
  number: 0
  # Mark as Python-version independent (ABI3). Requires recent conda-build.
  python_version_independent: true
  # The macOS wheel payload is universal2 and is published to both macOS conda
  # subdirs. Avoid running the opposite-architecture Python just to precompile
  # bytecode; Python can generate .pyc files at import time.
  skip_compile_pyc:
    - "*.py"

requirements:
  build:
#    - git
#    - cmake
#    - ninja

  # Pin the build/host to the exact variant python (from conda_build_config.yaml)
  host:
    - python {{ python }}

  # Runtime: only require Python >=3.12 (ABI3-compatible)
  run:
    - python >=3.12
    - numpy >=1.26

about:
  home: https://feng-lab.github.io
  license: Apache-2.0
  license_family: Apache
