package:
  name: zimg
  version: {{ datetime.datetime.today().strftime('%Y.%m.%d.%H') }}

source:
  path: ../src/3rdparty/build/conda_build

build:
  number: 0

requirements:
  build:
#    - git
#    - cmake
#    - ninja

  host:
    - qt
    - mkl-devel =2021.4.0
    - tbb-devel # [py>=39 or not osx]
    - tbb-devel =2020.2 # [osx and py==38]
    - python x.x
    - numpy

  run:
    - python
    - numpy >=1.20
    - qt
    - mkl
    - tbb # [py>=39 or not osx]
    - tbb =2020.2 # [osx and py==38]

test:

outputs:

about:
