package:
  name: zimg
  version: {{ datetime.datetime.today().strftime('%Y.%m.%d.%H') }}

source:
  path: ../src/3rdparty/build/conda_build

build:
  number: 0
  # We ship a stable-ABI extension; avoid pinning to a specific Python minor
  ignore_run_exports:
    - python

requirements:
  build:
#    - git
#    - cmake
#    - ninja

  host:
    - python >=3.12

  run:
    - python >=3.12

test:

outputs:

about:
