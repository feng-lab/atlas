package:
  name: zimg
  version: {{ datetime.datetime.today().strftime('%Y.%m.%d.%H') }}

source:
  path: ../src/3rdparty/build/conda_build

build:
  number: 0
  # Mark as Python-version independent (ABI3). Requires recent conda-build.
  python_version_independent: true

requirements:
  build:
#    - git
#    - cmake
#    - ninja

  # Pin the build/host to the exact variant python (from conda_build_config.yaml)
  host:
    - python {{ python }}

  # Runtime: only require Python >=3.12 (ABI3-compatible)
  run:
    - python >=3.12

test:
  imports:
    - zimg

outputs:

about:
  home: https://feng-lab.github.io
  license: proprietary - fenglab
  license_family: PROPRIETARY
