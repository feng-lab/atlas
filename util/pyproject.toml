[build-system]
requires = []
build-backend = "nonexistent.shownotbebuilt.backend"

[project]
name = "atlas-build-utils"
version = "0.0.0"
description = "Build and deployment utilities for Atlas CI (external deps, packaging, downloads)."
requires-python = ">=3.12"
authors = [{ name = "Feng Lab" }]
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.12",
  "Operating System :: OS Independent",
]
dependencies = [
  "boto3>=1.35.0",
  "requests>=2.31.0",
  "packaging>=23.2",
]

[project.urls]
Homepage = "https://github.com/feng-lab/atlas"

[tool.ruff]
# Keep formatting/linting out of generated files.
# Paths are relative to this pyproject location (util/).
extend-exclude = [
  "atlas_deps_filelist.py",
  "atlas_test_data_filelist.py",
]
