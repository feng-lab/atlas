[project]
name = "atlas-build-utils"
version = "0.0.0"
description = "Local dependency manifest for Atlas utility scripts."
requires-python = ">=3.12"
authors = [{ name = "Feng Lab" }]
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Operating System :: OS Independent",
]
dependencies = [
  "boto3>=1.42",
  "requests>=2.33",
  "packaging>=26",
]

[project.urls]
Homepage = "https://github.com/feng-lab/atlas"

[dependency-groups]
publish = [
  "build>=1.4",
  "twine>=6.2",
]
qt = [
  "aqtinstall>=3.3",
]

[tool.ruff]
# Keep formatting/linting out of generated files.
# Paths are relative to this pyproject location (util/).
extend-exclude = [
  "atlas_deps_filelist.py",
  "atlas_runtime_assets_filelist.py",
  "atlas_test_data_filelist.py",
]
