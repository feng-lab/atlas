name: Windows

on:
  push:
    branches:
      - main
  create:
    # Runs when a branch or tag is created; we gate to tags in job steps
  workflow_dispatch:

concurrency:
  # Cancel any in-progress run for the same ref (branch or tag),
  # regardless of commit SHA. For create tag events, use the tag ref.
  group: atlas-${{ github.workflow }}-${{ github.event_name == 'create' && format('refs/tags/{0}', github.event.ref) || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Official Intel oneAPI BaseKit offline installer URL (mirrors oneapi-ci)
  # Used to install MKL + oneTBB components silently on Windows runners.
  ONEAPI_BASEKIT_URL: https://registrationcenter-download.intel.com/akdlm/IRC_NAS/1f18901e-877d-469d-a41a-a10f11b39336/intel-oneapi-base-toolkit-2025.3.0.372_offline.exe
  # Centralize Qt version to make upgrades easy
  QT_VERSION: "6.9.2"
  # Pin a Vulkan SDK version
  VULKAN_SDK_VERSION: 1.4.328.1
  # Split point for 3rdparty build; job1 stops before this lib, job2 starts from this lib
  EXT_SPLIT_LIB: hdf5

jobs:
  ext-cache-probe:
    runs-on: windows-2022
    outputs:
      p2-hit: ${{ steps.cache-extlibs-probe.outputs.cache-hit }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'create' && github.event.ref || github.ref }}
          fetch-depth: 1

      - name: Probe 3rdparty build cache (final p2)
        id: cache-extlibs-probe
        uses: actions/cache/restore@v4
        with:
          path: |
            src/3rdparty/build
          key: ${{ runner.os }}-ext-p2-${{ hashFiles('util/atlas_deps_filelist.py') }}
          lookup-only: true

  build-env-1:
    runs-on: windows-2022
    needs: ext-cache-probe
    if: needs.ext-cache-probe.outputs.p2-hit != 'true'
    steps:
      - name: Disable Git autocrlf
        shell: pwsh
        run: |
          git config --global core.autocrlf false

      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'create' && github.event.ref || github.ref }}
          fetch-depth: 1
          submodules: recursive

      - name: Cache 3rdparty build (part 1)
        id: cache-extlibs-p1
        uses: actions/cache@v4
        with:
          path: |
            src/3rdparty/build
          key: ${{ runner.os }}-ext-p1-${{ hashFiles('util/atlas_deps_filelist.py') }}

      - name: Ensure Perl
        if: steps.cache-extlibs-p1.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          if (-not (Get-Command perl -ErrorAction SilentlyContinue)) {
            choco feature enable -n=allowGlobalConfirmation
            choco install strawberryperl
          }
          perl -v
          where perl

      - name: Restore Intel oneAPI cache
        if: steps.cache-extlibs-p1.outputs.cache-hit != 'true'
        id: cache-oneapi-restore-buildenv
        uses: actions/cache/restore@v4
        with:
          path: |
            C:\\Program Files (x86)\\Intel\\oneAPI
          key: ${{ runner.os }}-oneapi-${{ env.ONEAPI_BASEKIT_URL }}

      - name: Install Intel oneAPI BaseKit (installer)
        if: steps.cache-oneapi-restore-buildenv.outputs.cache-hit != 'true' && steps.cache-extlibs-p1.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          if (Test-Path "C:\Program Files (x86)\Intel\oneAPI") {
            Write-Host 'Intel oneAPI already installed; skipping.'
            exit 0
          }
          if (-not $env:ONEAPI_BASEKIT_URL) { Write-Error "ONEAPI_BASEKIT_URL is not set." }
          $components = 'intel.oneapi.win.mkl.devel:intel.oneapi.win.tbb.devel'
          Write-Host "Installing Intel oneAPI BaseKit via util\\install_windows.bat..."
          cmd.exe /c "util\\install_windows.bat $env:ONEAPI_BASEKIT_URL $components"
          if ($LASTEXITCODE -ne 0) { Write-Error "oneAPI installer exit code: $LASTEXITCODE" }
          # Validate install paths
          if (-not (Test-Path "C:\Program Files (x86)\Intel\oneAPI")) { Write-Error "Intel oneAPI root missing" }

      - name: Always save Intel oneAPI cache
        if: ${{ !cancelled() && steps.cache-oneapi-restore-buildenv.outputs.cache-hit != 'true' && steps.cache-extlibs-p1.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: |
            C:\\Program Files (x86)\\Intel\\oneAPI
          key: ${{ runner.os }}-oneapi-${{ env.ONEAPI_BASEKIT_URL }}

      - name: Cache Vulkan SDK (installed)
        if: steps.cache-extlibs-p1.outputs.cache-hit != 'true'
        id: cache-vulkan-build
        uses: actions/cache@v4
        with:
          path: |
            C:\VulkanSDK\${{ env.VULKAN_SDK_VERSION }}
          key: ${{ runner.os }}-vulkan-${{ env.VULKAN_SDK_VERSION }}

      - name: Install Vulkan SDK (LunarG installer)
        if: steps.cache-vulkan-build.outputs.cache-hit != 'true' && steps.cache-extlibs-p1.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $ver = $env:VULKAN_SDK_VERSION
          $cliName = "vulkansdk-windows-X64-$ver.exe"
          $cliPath = Join-Path $env:TEMP $cliName
          # Use $() to avoid parsing ambiguity before query string
          $url = "https://sdk.lunarg.com/sdk/download/$ver/windows/$($cliName)?Human=true"
          Write-Host "Downloading Vulkan SDK CLI $ver from: $url"
          Invoke-WebRequest -Uri $url -OutFile $cliPath -UseBasicParsing
          if (-not (Test-Path $cliPath)) { Write-Error "Download failed: $cliPath not found" }
          Write-Host "Installing Vulkan SDK components: core + VMA"
          $args = @('--accept-licenses','--default-answer','--confirm-command','install','com.lunarg.vulkan.core','com.lunarg.vulkan.vma')
          $p = Start-Process -FilePath $cliPath -ArgumentList $args -Wait -PassThru
          if ($p.ExitCode -ne 0) { Write-Error "Vulkan SDK CLI exit code: $($p.ExitCode)" }
          if (-not (Test-Path "C:\VulkanSDK\$env:VULKAN_SDK_VERSION\Bin\glslc.exe")) {
            Write-Error "glslc not found under C:\VulkanSDK\$env:VULKAN_SDK_VERSION\Bin — core tools missing"
          }

      - name: Detect existing conda
        if: steps.cache-extlibs-p1.outputs.cache-hit != 'true'
        id: detect-conda-be1
        shell: pwsh
        run: |
          if (Get-Command conda -ErrorAction SilentlyContinue) {
            "found=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            "found=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Setup Miniconda
        if: steps.cache-extlibs-p1.outputs.cache-hit != 'true' && steps.detect-conda-be1.outputs.found != 'true'
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.12"
          miniconda-version: "latest"
          channels: defaults

      - name: Create/Reset atlas-ci conda env
        if: steps.cache-extlibs-p1.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          conda info
          conda env remove -n atlas-ci -y
          if ($LASTEXITCODE -ne 0) { Write-Host "No existing atlas-ci env to remove (ok)" }
          conda create -n atlas-ci -y python=3.12
          if ($LASTEXITCODE -ne 0) { Write-Error "Failed to create atlas-ci env"; exit $LASTEXITCODE }

      - name: Install conda tooling and Python deps
        if: steps.cache-extlibs-p1.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $condaHook = (& conda 'shell.powershell' 'hook') | Out-String
          Invoke-Expression $condaHook
          conda activate atlas-ci
          conda info
          conda install -y anaconda-client conda-build pip
          if ($LASTEXITCODE -ne 0) { Write-Error "Failed to install conda packages into atlas-ci"; exit $LASTEXITCODE }
          python -m pip install --upgrade pip
          if ($LASTEXITCODE -ne 0) { Write-Error "Failed to upgrade pip in atlas-ci"; exit $LASTEXITCODE }
          python -m pip install --no-cache-dir aqtinstall requests packaging
          if ($LASTEXITCODE -ne 0) { Write-Error "Failed to install Python deps in atlas-ci"; exit $LASTEXITCODE }
          conda clean --all -y

      - name: Cache Qt (installed)
        if: steps.cache-extlibs-p1.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/Qt/${{ env.QT_VERSION }}
            ~/Qt/Tools/QtInstallerFramework
          key: ${{ runner.os }}-qt-${{ env.QT_VERSION }}

      - name: Install Qt 6 (aqt)
        if: steps.cache-extlibs-p1.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $condaHook = (& conda 'shell.powershell' 'hook') | Out-String
          Invoke-Expression $condaHook
          conda activate atlas-ci
          $qtRoot = Join-Path $HOME 'Qt'
          New-Item -ItemType Directory -Force -Path $qtRoot | Out-Null
          $qtVer = $env:QT_VERSION
          $qtMSVC = Join-Path (Join-Path $qtRoot $qtVer) 'msvc2022_64'
          if (Test-Path $qtMSVC) {
            Write-Host 'Qt already cached'
          } else {
            python -m aqt install-qt --outputdir "$qtRoot" windows desktop $qtVer win64_msvc2022_64
            if ($LASTEXITCODE -ne 0) { Write-Error "aqt install-qt failed"; exit $LASTEXITCODE }
          }
          $ifwDir = Join-Path (Join-Path $qtRoot 'Tools') 'QtInstallerFramework'
          if (Test-Path $ifwDir) {
            Write-Host 'Qt IFW cached'
          } else {
            python -m aqt install-tool --outputdir "$qtRoot" windows desktop tools_ifw qt.tools.ifw.47
            if ($LASTEXITCODE -ne 0) { Write-Error "aqt install-tool failed"; exit $LASTEXITCODE }
          }
          Get-ChildItem -Force $qtRoot | Select-Object FullName

      - name: Cache atlas_deps (download archives)
        if: steps.cache-extlibs-p1.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: |
            atlas_deps
          key: ${{ runner.os }}-atlasdeps-${{ hashFiles('util/atlas_deps_filelist.py') }}
          restore-keys: |
            ${{ runner.os }}-atlasdeps-

      - name: Build external deps
        if: steps.cache-extlibs-p1.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $condaHook = (& conda 'shell.powershell' 'hook') | Out-String
          Invoke-Expression $condaHook
          conda activate atlas-ci
          cd "$env:GITHUB_WORKSPACE"
          conda info
          python util/build_ext_libs.py all --stop-before $env:EXT_SPLIT_LIB
          if ($LASTEXITCODE -ne 0) { Write-Error "External deps build (part 1) failed with exit code $LASTEXITCODE"; exit $LASTEXITCODE }

  build-env-2:
    runs-on: windows-2022
    needs: [ext-cache-probe, build-env-1]
    if: needs.ext-cache-probe.outputs.p2-hit != 'true'
    steps:
      - name: Disable Git autocrlf
        shell: pwsh
        run: |
          git config --global core.autocrlf false

      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'create' && github.event.ref || github.ref }}
          fetch-depth: 1
          submodules: recursive

      - name: Ensure Perl
        shell: pwsh
        run: |
          if (-not (Get-Command perl -ErrorAction SilentlyContinue)) {
            choco feature enable -n=allowGlobalConfirmation
            choco install strawberryperl
          }
          perl -v
          where perl

      - name: Restore Intel oneAPI cache
        id: cache-oneapi-restore-buildenv2
        uses: actions/cache/restore@v4
        with:
          path: |
            C:\\Program Files (x86)\\Intel\\oneAPI
          key: ${{ runner.os }}-oneapi-${{ env.ONEAPI_BASEKIT_URL }}

      - name: Detect existing conda
        id: detect-conda-be2
        shell: pwsh
        run: |
          if (Get-Command conda -ErrorAction SilentlyContinue) {
            "found=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            "found=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Setup Miniconda
        if: steps.detect-conda-be2.outputs.found != 'true'
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.12"
          miniconda-version: "latest"
          channels: defaults
      
      - name: Create/Reset atlas-ci conda env
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          conda info
          conda env remove -n atlas-ci -y
          if ($LASTEXITCODE -ne 0) { Write-Host "No existing atlas-ci env to remove (ok)" }
          conda create -n atlas-ci -y python=3.12
          if ($LASTEXITCODE -ne 0) { Write-Error "Failed to create atlas-ci env"; exit $LASTEXITCODE }
      
      - name: Install conda tooling and Python deps
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $condaHook = (& conda 'shell.powershell' 'hook') | Out-String
          Invoke-Expression $condaHook
          conda activate atlas-ci
          conda info
          conda install -y anaconda-client conda-build pip
          if ($LASTEXITCODE -ne 0) { Write-Error "Failed to install conda packages into atlas-ci"; exit $LASTEXITCODE }
          python -m pip install --upgrade pip
          if ($LASTEXITCODE -ne 0) { Write-Error "Failed to upgrade pip in atlas-ci"; exit $LASTEXITCODE }
          python -m pip install --no-cache-dir aqtinstall requests packaging
          if ($LASTEXITCODE -ne 0) { Write-Error "Failed to install Python deps in atlas-ci"; exit $LASTEXITCODE }
          conda clean --all -y

      - name: Cache atlas_deps (download archives)
        uses: actions/cache@v4
        with:
          path: |
            atlas_deps
          key: ${{ runner.os }}-atlasdeps-${{ hashFiles('util/atlas_deps_filelist.py') }}
          restore-keys: |
            ${{ runner.os }}-atlasdeps-

      - name: Cache 3rdparty build (part 2)
        id: cache-extlibs-p2
        uses: actions/cache@v4
        with:
          path: |
            src/3rdparty/build
          key: ${{ runner.os }}-ext-p2-${{ hashFiles('util/atlas_deps_filelist.py') }}
          restore-keys: |
            ${{ runner.os }}-ext-p1-

      - name: Build external deps
        if: steps.cache-extlibs-p2.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $condaHook = (& conda 'shell.powershell' 'hook') | Out-String
          Invoke-Expression $condaHook
          conda activate atlas-ci
          cd "$env:GITHUB_WORKSPACE"
          conda info
          python util/build_ext_libs.py all --start-from $env:EXT_SPLIT_LIB
          if ($LASTEXITCODE -ne 0) { Write-Error "External deps build (part 2) failed with exit code $LASTEXITCODE"; exit $LASTEXITCODE }

  build:
    runs-on: windows-2022
    needs: [ext-cache-probe, build-env-2]
    if: ${{ !cancelled() && (needs.ext-cache-probe.outputs.p2-hit == 'true' || needs.build-env-2.result == 'success') }}
    permissions:
      contents: write
    steps:
      - name: Disable Git autocrlf
        shell: pwsh
        run: |
          git config --global core.autocrlf false

      - uses: actions/checkout@v5
        with:
          # Fetch full history and tags so git_describe works
          ref: ${{ github.event_name == 'create' && github.event.ref || github.ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Load CI env (masked)
        uses: ./.github/actions/load-dotenv
        with:
          dotenv: ${{ secrets.ATLAS_ENV_LOCAL }}

      - name: Ensure Perl
        shell: pwsh
        run: |
          if (-not (Get-Command perl -ErrorAction SilentlyContinue)) {
            choco feature enable -n=allowGlobalConfirmation
            choco install strawberryperl
          }
          perl -v
          where perl

      - name: Restore Intel oneAPI cache
        id: cache-oneapi-restore-build
        uses: actions/cache/restore@v4
        with:
          path: |
            C:\\Program Files (x86)\\Intel\\oneAPI
          key: ${{ runner.os }}-oneapi-${{ env.ONEAPI_BASEKIT_URL }}

      - name: Install Intel oneAPI BaseKit (installer)
        if: steps.cache-oneapi-restore-build.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          if (Test-Path "C:\Program Files (x86)\Intel\oneAPI") {
            Write-Host 'Intel oneAPI already installed; skipping.'
            exit 0
          }
          if (-not $env:ONEAPI_BASEKIT_URL) { Write-Error "ONEAPI_BASEKIT_URL is not set." }
          $components = 'intel.oneapi.win.mkl.devel:intel.oneapi.win.tbb.devel'
          Write-Host "Installing Intel oneAPI BaseKit via util\\install_windows.bat..."
          cmd.exe /c "util\\install_windows.bat $env:ONEAPI_BASEKIT_URL $components"
          if ($LASTEXITCODE -ne 0) { Write-Error "oneAPI installer exit code: $LASTEXITCODE" }
          # Validate install paths
          if (-not (Test-Path "C:\Program Files (x86)\Intel\oneAPI")) { Write-Error "Intel oneAPI root missing" }

      - name: Always save Intel oneAPI cache
        if: ${{ !cancelled() && steps.cache-oneapi-restore-build.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: |
            C:\\Program Files (x86)\\Intel\\oneAPI
          key: ${{ runner.os }}-oneapi-${{ env.ONEAPI_BASEKIT_URL }}

      - name: Cache Vulkan SDK (installed)
        id: cache-vulkan
        uses: actions/cache@v4
        with:
          path: |
            C:\VulkanSDK\${{ env.VULKAN_SDK_VERSION }}
          key: ${{ runner.os }}-vulkan-${{ env.VULKAN_SDK_VERSION }}

      - name: Install Vulkan SDK (LunarG installer)
        if: steps.cache-vulkan.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $ver = $env:VULKAN_SDK_VERSION
          $cliName = "vulkansdk-windows-X64-$ver.exe"
          $cliPath = Join-Path $env:TEMP $cliName
          # Use $() to avoid parsing ambiguity before query string
          $url = "https://sdk.lunarg.com/sdk/download/$ver/windows/$($cliName)?Human=true"
          Write-Host "Downloading Vulkan SDK CLI $ver from: $url"
          Invoke-WebRequest -Uri $url -OutFile $cliPath -UseBasicParsing
          if (-not (Test-Path $cliPath)) { Write-Error "Download failed: $cliPath not found" }
          Write-Host "Installing Vulkan SDK components: core + VMA"
          $args = @('--accept-licenses','--default-answer','--confirm-command','install','com.lunarg.vulkan.core','com.lunarg.vulkan.vma')
          $p = Start-Process -FilePath $cliPath -ArgumentList $args -Wait -PassThru
          if ($p.ExitCode -ne 0) { Write-Error "Vulkan SDK CLI exit code: $($p.ExitCode)" }
          if (-not (Test-Path "C:\VulkanSDK\$env:VULKAN_SDK_VERSION\Bin\glslc.exe")) {
            Write-Error "glslc not found under C:\VulkanSDK\$env:VULKAN_SDK_VERSION\Bin — core tools missing"
          }
          Get-ChildItem -Force "C:\VulkanSDK\$env:VULKAN_SDK_VERSION" | Select-Object FullName

      - name: Detect existing conda
        id: detect-conda-build
        shell: pwsh
        run: |
          if (Get-Command conda -ErrorAction SilentlyContinue) {
            "found=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            "found=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Setup Miniconda
        if: steps.detect-conda-build.outputs.found != 'true'
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.12"
          miniconda-version: "latest"
          channels: defaults

      - name: Create/Reset atlas-ci conda env
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          conda info
          conda env remove -n atlas-ci -y
          if ($LASTEXITCODE -ne 0) { Write-Host "No existing atlas-ci env to remove (ok)" }
          conda create -n atlas-ci -y python=3.12
          if ($LASTEXITCODE -ne 0) { Write-Error "Failed to create atlas-ci env"; exit $LASTEXITCODE }

      - name: Install conda tooling
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $condaHook = (& conda 'shell.powershell' 'hook') | Out-String
          Invoke-Expression $condaHook
          conda activate atlas-ci
          conda info
          conda install -y anaconda-client conda-build pip
          if ($LASTEXITCODE -ne 0) { Write-Error "Failed to install conda packages into atlas-ci"; exit $LASTEXITCODE }
          python -m pip install --upgrade pip
          if ($LASTEXITCODE -ne 0) { Write-Error "Failed to upgrade pip in atlas-ci"; exit $LASTEXITCODE }
          python -m pip install --no-cache-dir aqtinstall requests packaging build twine
          if ($LASTEXITCODE -ne 0) { Write-Error "Failed to install Python deps in atlas-ci"; exit $LASTEXITCODE }

      - name: Cache Qt (installed)
        uses: actions/cache@v4
        with:
          path: |
            ~/Qt/${{ env.QT_VERSION }}
            ~/Qt/Tools/QtInstallerFramework
          key: ${{ runner.os }}-qt-${{ env.QT_VERSION }}

      - name: Install Qt 6 (aqt)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $condaHook = (& conda 'shell.powershell' 'hook') | Out-String
          Invoke-Expression $condaHook
          conda activate atlas-ci
          $qtRoot = Join-Path $HOME 'Qt'
          New-Item -ItemType Directory -Force -Path $qtRoot | Out-Null
          $qtVer = $env:QT_VERSION
          $qtMSVC = Join-Path (Join-Path $qtRoot $qtVer) 'msvc2022_64'
          if (Test-Path $qtMSVC) {
            Write-Host 'Qt already cached'
          } else {
            python -m aqt install-qt --outputdir "$qtRoot" windows desktop $qtVer win64_msvc2022_64
            if ($LASTEXITCODE -ne 0) { Write-Error "aqt install-qt failed"; exit $LASTEXITCODE }
          }
          $ifwDir = Join-Path (Join-Path $qtRoot 'Tools') 'QtInstallerFramework'
          if (Test-Path $ifwDir) {
            Write-Host 'Qt IFW cached'
          } else {
            python -m aqt install-tool --outputdir "$qtRoot" windows desktop tools_ifw qt.tools.ifw.47
            if ($LASTEXITCODE -ne 0) { Write-Error "aqt install-tool failed"; exit $LASTEXITCODE }
          }
          Get-ChildItem -Force $qtRoot | Select-Object FullName

      - name: Cache 3rdparty build (final)
        uses: actions/cache@v4
        with:
          path: |
            src/3rdparty/build
          key: ${{ runner.os }}-ext-p2-${{ hashFiles('util/atlas_deps_filelist.py') }}

      - name: Cache atlas_deps (download archives)
        uses: actions/cache@v4
        with:
          path: |
            atlas_deps
          key: ${{ runner.os }}-atlasdeps-${{ hashFiles('util/atlas_deps_filelist.py') }}
          restore-keys: |
            ${{ runner.os }}-atlasdeps-

      - name: Cache atlas test data
        uses: actions/cache@v4
        with:
          enableCrossOsArchive: true
          path: |
            atlas_test_data
          key: ${{ format('testdata-{0}', hashFiles('util/atlas_test_data_filelist.py')) }}
          restore-keys: |
            testdata-

      - name: Build and deploy Atlas
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $condaHook = (& conda 'shell.powershell' 'hook') | Out-String
          Invoke-Expression $condaHook
          conda activate atlas-ci
          cd "$env:GITHUB_WORKSPACE"
          python util/build_and_deploy_atlas.py
          if ($LASTEXITCODE -ne 0) { Write-Error "build_and_deploy_atlas failed with exit code $LASTEXITCODE"; exit $LASTEXITCODE }

      - name: Setup SSH key
        shell: bash -l {0}
        run: |
          set -euo pipefail
          if [ -z "${SSH_PRIVATE_KEY_BASE64:-}" ] || [ -z "${SSH_KNOWN_HOSTS_BASE64:-}" ]; then
            echo "Error: SSH_PRIVATE_KEY_BASE64 / SSH_KNOWN_HOSTS_BASE64 are not set. Provide them via the ATLAS_ENV_LOCAL dotenv secret." >&2
            exit 1
          fi
          mkdir -p ~/.ssh/
          sshPrivateKeyB64="${SSH_PRIVATE_KEY_BASE64//$'\r'/}"
          sshPrivateKeyB64="${sshPrivateKeyB64//$'\n'/}"
          if [[ "${sshPrivateKeyB64}" == *% ]]; then
            sshPrivateKeyB64="${sshPrivateKeyB64%?}"
          fi
          printf '%s' "$sshPrivateKeyB64" | base64 --decode > ~/.ssh/private.key
          chmod 600 ~/.ssh/private.key
          # Append CI known_hosts entries; do not clobber existing user configuration
          sshKnownHostsB64="${SSH_KNOWN_HOSTS_BASE64//$'\r'/}"
          sshKnownHostsB64="${sshKnownHostsB64//$'\n'/}"
          if [[ "${sshKnownHostsB64}" == *% ]]; then
            sshKnownHostsB64="${sshKnownHostsB64%?}"
          fi
          printf '%s' "$sshKnownHostsB64" | base64 --decode >> ~/.ssh/known_hosts
          printf '\n' >> ~/.ssh/known_hosts

      - name: Create or update release and upload assets (gh CLI)
        if: github.event_name == 'create' && github.ref_type == 'tag' && startsWith(github.event.ref, 'v')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.ref }}
        shell: bash -l {0}
        run: |
          set -euo pipefail

          retry() {
            local attempts="${1:?attempts missing}"
            local base_delay="${2:?base_delay missing}"
            local max_delay="${3:?max_delay missing}"
            shift 3
            local attempt=1
            while true; do
              if "$@"; then
                return 0
              fi
              local rc=$?
              if [ "$attempt" -ge "$attempts" ]; then
                echo "Command failed after ${attempts} attempts (exit ${rc}): $*" >&2
                return "$rc"
              fi
              local sleep_for=$(( base_delay * (2 ** (attempt - 1)) ))
              if [ "$sleep_for" -gt "$max_delay" ]; then
                sleep_for="$max_delay"
              fi
              echo "Command failed (exit ${rc}); retrying in ${sleep_for}s (${attempt}/${attempts}): $*" >&2
              sleep "$sleep_for"
              attempt=$(( attempt + 1 ))
            done
          }

          publish_release() {
            TAG="${TAG_NAME:-${GITHUB_REF#refs/tags/}}"
            echo "Creating/updating release for tag: $TAG"

            if gh release view "$TAG" >/dev/null 2>&1; then
              echo "Release $TAG already exists"
            else
              # `gh release view` can fail due to transient GitHub/network issues. If create fails,
              # re-check whether the release exists before aborting.
              if ! gh release create "$TAG" --title "$TAG" --generate-notes; then
                if gh release view "$TAG" >/dev/null 2>&1; then
                  echo "Release $TAG exists after failed create; continuing"
                else
                  return 1
                fi
              fi
            fi

            shopt -s nullglob
            files=(deploy/AtlasInstaller*.zip deploy/atlas-*.zip)
            if [ ${#files[@]} -eq 0 ]; then
              echo "No release zip files found under deploy/" >&2
              return 1
            fi
            gh release upload "$TAG" "${files[@]}" --clobber
          }

          retry 5 5 60 publish_release

      - name: Deploy artifacts (SSH)
        shell: bash -l {0}
        run: |
          set -euo pipefail
          retry() {
            local attempts="${1:?attempts missing}"
            local base_delay="${2:?base_delay missing}"
            local max_delay="${3:?max_delay missing}"
            shift 3
            local attempt=1
            while true; do
              if "$@"; then
                return 0
              fi
              local rc=$?
              if [ "$attempt" -ge "$attempts" ]; then
                echo "Command failed after ${attempts} attempts (exit ${rc}): $*" >&2
                return "$rc"
              fi
              local sleep_for=$(( base_delay * (2 ** (attempt - 1)) ))
              if [ "$sleep_for" -gt "$max_delay" ]; then
                sleep_for="$max_delay"
              fi
              echo "Command failed (exit ${rc}); retrying in ${sleep_for}s (${attempt}/${attempts}): $*" >&2
              sleep "$sleep_for"
              attempt=$(( attempt + 1 ))
            done
          }
          : "${SSH_SERVER:?Error: SSH_SERVER is not set (ATLAS_ENV_LOCAL)}"
          : "${SSH_PORT:?Error: SSH_PORT is not set (ATLAS_ENV_LOCAL)}"
          : "${SSH_USERNAME:?Error: SSH_USERNAME is not set (ATLAS_ENV_LOCAL)}"
          : "${SSH_DEPLOY_PATH:?Error: SSH_DEPLOY_PATH is not set (ATLAS_ENV_LOCAL)}"
          deploy_primary() {
            # Ensure remote paths exist and replace the Windows package folder
            ssh -p "$SSH_PORT" -i ~/.ssh/private.key "$SSH_USERNAME@$SSH_SERVER" \
              "mkdir -p '$SSH_DEPLOY_PATH/packages' '$SSH_DEPLOY_PATH/installers' && rm -rf '$SSH_DEPLOY_PATH/packages/Windows'"
            scp -P "$SSH_PORT" -i ~/.ssh/private.key -r "deploy/Windows" "$SSH_USERNAME@$SSH_SERVER:$SSH_DEPLOY_PATH/packages/"
            scp -P "$SSH_PORT" -i ~/.ssh/private.key deploy/AtlasInstaller-Windows.zip "$SSH_USERNAME@$SSH_SERVER:$SSH_DEPLOY_PATH/installers/"
          }
          retry 5 5 60 deploy_primary

