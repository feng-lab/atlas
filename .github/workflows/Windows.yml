name: Windows

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'python/atlas_agent/**'
      - 'LICENSE'
      - 'NOTICE'
  create:
    # Runs when a branch or tag is created; jobs are gated to tags (skip branch creates)
  workflow_dispatch:

concurrency:
  # Cancel any in-progress run for the same ref (branch or tag),
  # regardless of commit SHA. For create tag events, use the tag ref.
  group: atlas-${{ github.workflow }}-${{ github.event_name == 'create' && format('refs/tags/{0}', github.event.ref) || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Centralize Qt version to make upgrades easy
  QT_VERSION: "6.9.2"
  # Minimum Python version used by CI build environments
  PYTHON_VERSION_MIN: "3.12"
  # Python used by the 3rdparty source build. It does not need the final conda env.
  LIB_BUILD_PYTHON_VERSION: "3.14"
  # Pin a Vulkan SDK version
  VULKAN_SDK_VERSION: 1.4.350.0
  # Split point for 3rdparty build; job1 stops before this lib, job2 starts from this lib.
  # Keep HDF5 in part 1 because its build expects Perl and part 1 installs Perl.
  EXT_SPLIT_LIB: itk

jobs:
  ext-cache-probe:
    runs-on: windows-2022
    if: ${{ github.event_name != 'create' || github.ref_type == 'tag' }}
    outputs:
      p2-hit: ${{ steps.cache-extlibs-probe.outputs.cache-hit }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'create' && github.event.ref || github.ref }}
          fetch-depth: 1

      - name: Probe 3rdparty build cache (final p2)
        id: cache-extlibs-probe
        uses: actions/cache/restore@v5
        with:
          path: |
            src/3rdparty/build
          key: ${{ runner.os }}-ext-p2-${{ hashFiles('util/atlas_deps_filelist.py') }}
          lookup-only: true

  build-env-1:
    runs-on: windows-2022
    needs: ext-cache-probe
    if: ${{ (github.event_name != 'create' || github.ref_type == 'tag') && needs.ext-cache-probe.outputs.p2-hit != 'true' }}
    steps:
      - name: Disable Git autocrlf
        shell: pwsh
        run: |
          git config --global core.autocrlf false

      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'create' && github.event.ref || github.ref }}
          fetch-depth: 1
          submodules: recursive

      - name: Load CI env (masked)
        uses: ./.github/actions/load-dotenv
        with:
          dotenv: ${{ secrets.ATLAS_ENV_LOCAL }}

      - name: Cache 3rdparty build (part 1)
        id: cache-extlibs-p1
        uses: actions/cache@v5
        with:
          path: |
            src/3rdparty/build
          key: ${{ runner.os }}-ext-p1-${{ hashFiles('util/atlas_deps_filelist.py') }}

      - name: Ensure Perl
        if: steps.cache-extlibs-p1.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          if (-not (Get-Command perl -ErrorAction SilentlyContinue)) {
            choco feature enable -n=allowGlobalConfirmation
            choco install strawberryperl
          }
          perl -v
          where perl

      - name: Install LLVM (release tarball)
        if: steps.cache-extlibs-p1.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          & .\util\install_llvm_windows.ps1

      - name: Setup Python for external deps
        if: steps.cache-extlibs-p1.outputs.cache-hit != 'true'
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.LIB_BUILD_PYTHON_VERSION }}

      - name: Install Python deps for external deps
        if: steps.cache-extlibs-p1.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          python --version
          python -m pip install --upgrade pip
          if ($LASTEXITCODE -ne 0) { Write-Error "Failed to upgrade pip"; exit $LASTEXITCODE }
          python -m pip install --no-cache-dir requests packaging boto3
          if ($LASTEXITCODE -ne 0) { Write-Error "Failed to install Python deps"; exit $LASTEXITCODE }

      - name: Build external deps
        if: steps.cache-extlibs-p1.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          cd "$env:GITHUB_WORKSPACE"
          python util/build_ext_libs.py all --stop-before $env:EXT_SPLIT_LIB
          if ($LASTEXITCODE -ne 0) { Write-Error "External deps build (part 1) failed with exit code $LASTEXITCODE"; exit $LASTEXITCODE }

  build-env-2:
    runs-on: windows-2022
    needs: [ext-cache-probe, build-env-1]
    if: ${{ (github.event_name != 'create' || github.ref_type == 'tag') && needs.ext-cache-probe.outputs.p2-hit != 'true' }}
    steps:
      - name: Disable Git autocrlf
        shell: pwsh
        run: |
          git config --global core.autocrlf false

      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'create' && github.event.ref || github.ref }}
          fetch-depth: 1
          submodules: recursive

      - name: Load CI env (masked)
        uses: ./.github/actions/load-dotenv
        with:
          dotenv: ${{ secrets.ATLAS_ENV_LOCAL }}

      - name: Install LLVM (release tarball)
        shell: pwsh
        run: |
          & .\util\install_llvm_windows.ps1

      - name: Setup Python for external deps
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.LIB_BUILD_PYTHON_VERSION }}
      
      - name: Install Python deps for external deps
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          python --version
          python -m pip install --upgrade pip
          if ($LASTEXITCODE -ne 0) { Write-Error "Failed to upgrade pip"; exit $LASTEXITCODE }
          python -m pip install --no-cache-dir requests packaging boto3
          if ($LASTEXITCODE -ne 0) { Write-Error "Failed to install Python deps"; exit $LASTEXITCODE }

      - name: Cache 3rdparty build (part 2)
        id: cache-extlibs-p2
        uses: actions/cache@v5
        with:
          path: |
            src/3rdparty/build
          key: ${{ runner.os }}-ext-p2-${{ hashFiles('util/atlas_deps_filelist.py') }}
          restore-keys: |
            ${{ runner.os }}-ext-p1-

      - name: Build external deps
        if: steps.cache-extlibs-p2.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          cd "$env:GITHUB_WORKSPACE"
          python util/build_ext_libs.py all --start-from $env:EXT_SPLIT_LIB
          if ($LASTEXITCODE -ne 0) { Write-Error "External deps build (part 2) failed with exit code $LASTEXITCODE"; exit $LASTEXITCODE }

  build:
    runs-on: windows-2022
    needs: [ext-cache-probe, build-env-2]
    if: ${{ (github.event_name != 'create' || github.ref_type == 'tag') && !cancelled() && (needs.ext-cache-probe.outputs.p2-hit == 'true' || needs.build-env-2.result == 'success') }}
    permissions:
      contents: write
    steps:
      - name: Disable Git autocrlf
        shell: pwsh
        run: |
          git config --global core.autocrlf false

      - uses: actions/checkout@v5
        with:
          # Fetch full history and tags so git_describe works
          ref: ${{ github.event_name == 'create' && github.event.ref || github.ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Load CI env (masked)
        uses: ./.github/actions/load-dotenv
        with:
          dotenv: ${{ secrets.ATLAS_ENV_LOCAL }}

      - name: Ensure Perl
        shell: pwsh
        run: |
          if (-not (Get-Command perl -ErrorAction SilentlyContinue)) {
            choco feature enable -n=allowGlobalConfirmation
            choco install strawberryperl
          }
          perl -v
          where perl

      - name: Install LLVM (release tarball)
        shell: pwsh
        run: |
          & .\util\install_llvm_windows.ps1

      - name: Cache Vulkan SDK (installed)
        id: cache-vulkan
        uses: actions/cache@v5
        with:
          path: |
            C:\VulkanSDK\${{ env.VULKAN_SDK_VERSION }}
          key: ${{ runner.os }}-vulkan-${{ env.VULKAN_SDK_VERSION }}

      - name: Install Vulkan SDK (LunarG installer)
        if: steps.cache-vulkan.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $ver = $env:VULKAN_SDK_VERSION
          $cliName = "vulkansdk-windows-X64-$ver.exe"
          $cliPath = Join-Path $env:TEMP $cliName
          # Use $() to avoid parsing ambiguity before query string
          $url = "https://sdk.lunarg.com/sdk/download/$ver/windows/$($cliName)?Human=true"
          Write-Host "Downloading Vulkan SDK CLI $ver from: $url"
          Invoke-WebRequest -Uri $url -OutFile $cliPath -UseBasicParsing
          if (-not (Test-Path $cliPath)) { Write-Error "Download failed: $cliPath not found" }
          Write-Host "Installing Vulkan SDK components: core + VMA"
          $args = @('--accept-licenses','--default-answer','--confirm-command','install','com.lunarg.vulkan.core','com.lunarg.vulkan.vma')
          $p = Start-Process -FilePath $cliPath -ArgumentList $args -Wait -PassThru
          if ($p.ExitCode -ne 0) { Write-Error "Vulkan SDK CLI exit code: $($p.ExitCode)" }
          if (-not (Test-Path "C:\VulkanSDK\$env:VULKAN_SDK_VERSION\Bin\glslc.exe")) {
            Write-Error "glslc not found under C:\VulkanSDK\$env:VULKAN_SDK_VERSION\Bin — core tools missing"
          }
          Get-ChildItem -Force "C:\VulkanSDK\$env:VULKAN_SDK_VERSION" | Select-Object FullName

      - name: Install SwiftShader Vulkan ICD
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $dest = 'C:\SwiftShader'
          $zip = Join-Path $env:TEMP 'swiftshader-win64.zip'
          $version = '5.0.0.1'
          $releaseTag = '20260413'
          $expectedSha = '61a5fee9f55f51374ae418fcbcc281d435d10e8ba466bccba3997d1773ae0bea'
          $url = "https://github.com/jakoch/rasterizers/releases/download/$releaseTag/swiftshader-win64-$version.zip"
          Write-Host "Downloading SwiftShader from: $url"
          Remove-Item -Recurse -Force $dest -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          curl.exe -L --fail --retry 3 --output $zip $url
          if ($LASTEXITCODE -ne 0) { Write-Error "SwiftShader download failed with exit code $LASTEXITCODE"; exit $LASTEXITCODE }
          $actualSha = (Get-FileHash -Path $zip -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualSha -ne $expectedSha) {
            Write-Error "SwiftShader archive SHA256 mismatch. Expected $expectedSha, got $actualSha"
          }
          Expand-Archive -Path $zip -DestinationPath $dest -Force
          foreach ($file in @('vk_swiftshader.dll', 'vk_swiftshader_icd.json', 'vulkan-1.dll')) {
            $path = Join-Path $dest $file
            if (-not (Test-Path $path)) {
              Write-Error "SwiftShader file missing: $path"
            }
          }
          Get-ChildItem -Force $dest | Select-Object FullName

      - name: Register SwiftShader Vulkan ICD
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $icd = 'C:\SwiftShader\vk_swiftshader_icd.json'
          if (-not (Test-Path $icd)) {
            Write-Error "SwiftShader ICD manifest not found: $icd"
          }
          # GitHub-hosted Windows jobs run with elevated privileges, so the
          # Vulkan loader may ignore VK_DRIVER_FILES/VK_ICD_FILENAMES. Register
          # SwiftShader where the system loader performs elevated ICD discovery.
          reg.exe add "HKLM\SOFTWARE\Khronos\Vulkan\Drivers" /v "$icd" /t REG_DWORD /d 0 /f
          if ($LASTEXITCODE -ne 0) { Write-Error "Failed to register SwiftShader ICD"; exit $LASTEXITCODE }
          reg.exe query "HKLM\SOFTWARE\Khronos\Vulkan\Drivers"
          if ($LASTEXITCODE -ne 0) { Write-Error "Failed to query Vulkan driver registry"; exit $LASTEXITCODE }

      - name: Setup conda
        uses: conda-incubator/setup-miniconda@v4
        with:
          auto-update-conda: true
          activate-environment: ""
          auto-activate: false
          channels: defaults

      - name: Create/Reset atlas-ci conda env
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          conda info
          conda env remove -n atlas-ci -y
          if ($LASTEXITCODE -ne 0) { Write-Host "No existing atlas-ci env to remove (ok)" }
          conda create -n atlas-ci -y python=${{ env.PYTHON_VERSION_MIN }}
          if ($LASTEXITCODE -ne 0) { Write-Error "Failed to create atlas-ci env"; exit $LASTEXITCODE }

      - name: Install conda tooling
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $condaHook = (& conda 'shell.powershell' 'hook') | Out-String
          Invoke-Expression $condaHook
          conda activate atlas-ci
          conda info
          conda install -y anaconda-client conda-build pip
          if ($LASTEXITCODE -ne 0) { Write-Error "Failed to install conda packages into atlas-ci"; exit $LASTEXITCODE }
          python -m pip install --upgrade pip
          if ($LASTEXITCODE -ne 0) { Write-Error "Failed to upgrade pip in atlas-ci"; exit $LASTEXITCODE }
          python -m pip install --no-cache-dir aqtinstall requests packaging build twine boto3
          if ($LASTEXITCODE -ne 0) { Write-Error "Failed to install Python deps in atlas-ci"; exit $LASTEXITCODE }

      - name: Cache Qt (installed)
        uses: actions/cache@v5
        with:
          path: |
            ~/Qt/${{ env.QT_VERSION }}
            ~/Qt/Tools/QtInstallerFramework
          key: ${{ runner.os }}-qt-${{ env.QT_VERSION }}

      - name: Install Qt 6 (aqt)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $condaHook = (& conda 'shell.powershell' 'hook') | Out-String
          Invoke-Expression $condaHook
          conda activate atlas-ci
          $qtRoot = Join-Path $HOME 'Qt'
          New-Item -ItemType Directory -Force -Path $qtRoot | Out-Null
          $qtVer = $env:QT_VERSION
          $qtMSVC = Join-Path (Join-Path $qtRoot $qtVer) 'msvc2022_64'
          if (Test-Path $qtMSVC) {
            Write-Host 'Qt already cached'
          } else {
            python -m aqt install-qt --outputdir "$qtRoot" windows desktop $qtVer win64_msvc2022_64
            if ($LASTEXITCODE -ne 0) { Write-Error "aqt install-qt failed"; exit $LASTEXITCODE }
          }
          $ifwDir = Join-Path (Join-Path $qtRoot 'Tools') 'QtInstallerFramework'
          if (Test-Path $ifwDir) {
            Write-Host 'Qt IFW cached'
          } else {
            python -m aqt install-tool --outputdir "$qtRoot" windows desktop tools_ifw qt.tools.ifw.47
            if ($LASTEXITCODE -ne 0) { Write-Error "aqt install-tool failed"; exit $LASTEXITCODE }
          }
          Get-ChildItem -Force $qtRoot | Select-Object FullName

      - name: Cache 3rdparty build (final)
        uses: actions/cache@v5
        with:
          path: |
            src/3rdparty/build
          key: ${{ runner.os }}-ext-p2-${{ hashFiles('util/atlas_deps_filelist.py') }}

      - name: Cache atlas test data
        uses: actions/cache@v5
        with:
          enableCrossOsArchive: true
          path: |
            atlas_test_data
          key: ${{ format('testdata-{0}', hashFiles('util/atlas_test_data_filelist.py')) }}
          restore-keys: |
            testdata-

      - name: Build and deploy Atlas
        env:
          VK_DRIVER_FILES: C:\SwiftShader\vk_swiftshader_icd.json
          VK_ICD_FILENAMES: C:\SwiftShader\vk_swiftshader_icd.json
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $env:Path = "C:\SwiftShader;$env:Path"
          $condaHook = (& conda 'shell.powershell' 'hook') | Out-String
          Invoke-Expression $condaHook
          conda activate atlas-ci
          cd "$env:GITHUB_WORKSPACE"
          python util/build_and_deploy_atlas.py
          if ($LASTEXITCODE -ne 0) { Write-Error "build_and_deploy_atlas failed with exit code $LASTEXITCODE"; exit $LASTEXITCODE }

      - name: Publish artifacts to R2
        shell: bash -l {0}
        run: |
          set -euo pipefail
          eval "$(conda shell.bash hook)"
          conda activate atlas-ci
          cd "$GITHUB_WORKSPACE"
          python util/publish_r2.py publish-ifw --os Windows

      - name: Create or update release and upload assets (gh CLI)
        if: github.event_name == 'create' && github.ref_type == 'tag' && startsWith(github.event.ref, 'v')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.ref }}
        shell: bash -l {0}
        run: |
          set -euo pipefail

          retry() {
            local attempts="${1:?attempts missing}"
            local base_delay="${2:?base_delay missing}"
            local max_delay="${3:?max_delay missing}"
            shift 3
            local attempt=1
            while true; do
              if "$@"; then
                return 0
              fi
              local rc=$?
              if [ "$attempt" -ge "$attempts" ]; then
                echo "Command failed after ${attempts} attempts (exit ${rc}): ${1:-<unknown>}" >&2
                return "$rc"
              fi
              local sleep_for=$(( base_delay * (2 ** (attempt - 1)) ))
              if [ "$sleep_for" -gt "$max_delay" ]; then
                sleep_for="$max_delay"
              fi
              echo "Command failed (exit ${rc}); retrying in ${sleep_for}s (${attempt}/${attempts}): ${1:-<unknown>}" >&2
              sleep "$sleep_for"
              attempt=$(( attempt + 1 ))
            done
          }

          publish_release() {
            TAG="${TAG_NAME:-${GITHUB_REF#refs/tags/}}"
            echo "Creating/updating release for tag: $TAG"

            if gh release view "$TAG" >/dev/null 2>&1; then
              echo "Release $TAG already exists"
            else
              # `gh release view` can fail due to transient GitHub/network issues. If create fails,
              # re-check whether the release exists before aborting.
              if ! gh release create "$TAG" --title "$TAG" --generate-notes; then
                if gh release view "$TAG" >/dev/null 2>&1; then
                  echo "Release $TAG exists after failed create; continuing"
                else
                  return 1
                fi
              fi
            fi

            shopt -s nullglob
            files=(deploy/AtlasInstaller*.zip deploy/atlas-*.zip)
            if [ ${#files[@]} -eq 0 ]; then
              echo "No release zip files found under deploy/" >&2
              return 1
            fi
            gh release upload "$TAG" "${files[@]}" --clobber
          }

          retry 5 5 60 publish_release

      - name: Deploy artifacts (SSH)
        shell: bash -l {0}
        run: |
          eval "$(conda shell.bash hook)"
          conda activate atlas-ci
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          python util/deploy_artifacts_ssh.py --os Windows --method scp

      - name: Publish zimg (PyPI + conda)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $condaHook = (& conda 'shell.powershell' 'hook') | Out-String
          Invoke-Expression $condaHook
          conda activate atlas-ci
          if ($env:ANACONDA_API_TOKEN) {
            conda config --set anaconda_upload yes
            if ($LASTEXITCODE -ne 0) { Write-Error "conda config failed"; exit $LASTEXITCODE }
          }
          python -m pip install --upgrade pip
          if ($LASTEXITCODE -ne 0) { Write-Error "pip upgrade failed"; exit $LASTEXITCODE }
          python -m pip install --no-cache-dir build twine
          if ($LASTEXITCODE -ne 0) { Write-Error "pip install build twine failed"; exit $LASTEXITCODE }
          python util/publish_zimg.py
          if ($LASTEXITCODE -ne 0) { Write-Error "publish_zimg.py failed"; exit $LASTEXITCODE }
          Get-ChildItem -Recurse python/zimg/dist | Select-Object FullName
