name: Linux

on:
  push:
    branches:
      - mainXX
  create:
    # Runs when a branch or tag is created; we gate to tags in job steps
  workflow_dispatch:

concurrency:
  # Cancel any in-progress run for the same ref (branch or tag),
  # regardless of commit SHA. For create tag events, use the tag ref.
  group: atlas-${{ github.workflow }}-${{ github.event_name == 'create' && format('refs/tags/{0}', github.event.ref) || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Pin a Vulkan SDK version
  VULKAN_SDK_VERSION: 1.4.328.1
  # Choose LLVM/Clang major version; mirrored in build scripts via ATLAS_CLANG_MAJOR
  CLANG_MAJOR: "20"
  # Centralize Qt version to make upgrades easy
  QT_VERSION: "6.9.2"

jobs:
  build-env:
    runs-on: ubuntu-22.04
    steps:
      - name: Disable Git autocrlf
        shell: bash -l {0}
        run: |
          git config --global core.autocrlf false

      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'create' && github.event.ref || github.ref }}
          fetch-depth: 1
          submodules: recursive
          
      - name: Cache 3rdparty build
        id: cache-extlibs
        uses: actions/cache@v4
        with:
          path: |
            src/3rdparty/build
          key: ${{ runner.os }}-ext-${{ env.CLANG_MAJOR }}-${{ hashFiles('util/atlas_deps_filelist.py','util/build_ext_libs.py') }}

      - name: Free disk space
        if: steps.cache-extlibs.outputs.cache-hit != 'true'
        shell: bash -l {0}
        run: |
          set -euo pipefail
          echo "Disk usage before cleanup:" && df -h || true
          # Remove large preinstalled stacks we don't use
          sudo rm -rf /usr/lib/jvm
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/julia*
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          # Docker images and apt caches
          docker system prune -af || true
          docker builder prune -af || true
          echo "Disk usage after cleanup:" && df -h || true

      - name: Install base packages
        if: steps.cache-extlibs.outputs.cache-hit != 'true'
        shell: bash -l {0}
        run: |
          df -h
          sudo apt-get -y update
          sudo apt-get -y install \
            curl wget ca-certificates gnupg lsb-release software-properties-common \
            zsh build-essential git zip unzip rsync p7zip-full \
            nasm gperf patchelf \
            libgl1-mesa-dev libxrender-dev libxcursor-dev libglfw3-dev \
            libfreetype6-dev libfontconfig1-dev \
            libxkbcommon0 libxkbcommon-x11-0 \
            libxcb-xinerama0 libxcb-icccm4 libxcb-keysyms1 libxcb-image0 \
            libxcb-render-util0 libxcb-shape0 libxcb-xkb1 \
            unrar \
            golang-go
          g++ --version
          df -h

      - name: Install LLVM clang
        if: steps.cache-extlibs.outputs.cache-hit != 'true'
        shell: bash -l {0}
        run: |
          curl -fsSL https://apt.llvm.org/llvm.sh -o /tmp/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh ${CLANG_MAJOR}
          sudo apt-get -y install clang-${CLANG_MAJOR} lld-${CLANG_MAJOR} clang-tools-${CLANG_MAJOR}
          clang-${CLANG_MAJOR} --version

      - name: Install Intel oneAPI MKL/TBB (apt)
        if: steps.cache-extlibs.outputs.cache-hit != 'true'
        shell: bash -l {0}
        run: |
          set -euo pipefail
          sudo mkdir -p /usr/share/keyrings
          # Follow Intel's official instructions to fetch and dearmor the key
          wget -O- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB \
            | gpg --dearmor | sudo tee /usr/share/keyrings/oneapi-archive-keyring.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/oneapi-archive-keyring.gpg] https://apt.repos.intel.com/oneapi all main" | \
            sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update -o Acquire::Retries=3
          sudo apt-get -y install intel-oneapi-mkl-devel intel-oneapi-tbb-devel || { echo "oneAPI apt install failed" >&2; exit 1; }
          # Hard fail if expected directories are missing so the job stops here
          test -d /opt/intel/oneapi || { echo "/opt/intel/oneapi not found" >&2; exit 1; }
          test -d /opt/intel/oneapi/tbb/latest/lib/cmake/tbb || { echo "TBB CMake config missing" >&2; exit 1; }

      - name: Cache Vulkan SDK (installed)
        if: steps.cache-extlibs.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/VulkanSDK/${{ env.VULKAN_SDK_VERSION }}
          key: ${{ runner.os }}-vulkan-${{ env.VULKAN_SDK_VERSION }}

      - name: Install Vulkan SDK (LunarG)
        if: steps.cache-extlibs.outputs.cache-hit != 'true'
        shell: bash -l {0}
        run: |
          mkdir -p "$HOME/VulkanSDK"
          cd "$HOME/VulkanSDK"
          if [ -d "$HOME/VulkanSDK/${VULKAN_SDK_VERSION}" ]; then echo "Vulkan SDK cached"; else \
            SDK_TAR="vulkansdk-linux-x86_64-${VULKAN_SDK_VERSION}.tar.xz"; \
            curl -fL "https://sdk.lunarg.com/sdk/download/${VULKAN_SDK_VERSION}/linux/${SDK_TAR}?Human=true" -o "${SDK_TAR}"; \
            tar -xJf "${SDK_TAR}"; \
            rm -f "${SDK_TAR}"; \
          fi
          ls -la "$HOME/VulkanSDK"

      - name: Setup Miniconda
        if: steps.cache-extlibs.outputs.cache-hit != 'true'
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.12"
          activate-environment: atlas-ci
          miniconda-version: "latest"
          channels: defaults

      - name: Show Python version
        if: steps.cache-extlibs.outputs.cache-hit != 'true'
        shell: bash -l {0}
        run: |
          python -V
          which python
          pip --version

      - name: Cache conda pkgs
        if: steps.cache-extlibs.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.CONDA }}/pkgs
            ~/.conda/pkgs
          key: ${{ runner.os }}-condapkgs-3.12

      - name: Install conda tooling
        if: steps.cache-extlibs.outputs.cache-hit != 'true'
        shell: bash -l {0}
        run: |
          conda info
          conda update --all -y
          conda install -y anaconda-client conda-build pip
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir aqtinstall requests packaging openai openai-agents grpcio-tools grpcio protobuf jsonschema
          conda clean --all -y

      - name: Cache Qt (installed)
        if: steps.cache-extlibs.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/Qt/${{ env.QT_VERSION }}
            ~/Qt/Tools/QtInstallerFramework
          key: ${{ runner.os }}-qt-${{ env.QT_VERSION }}

      - name: Install Qt 6 (aqt)
        if: steps.cache-extlibs.outputs.cache-hit != 'true'
        shell: bash -l {0}
        run: |
          # Match readme.md recommendation for Linux
          mkdir -p "$HOME/Qt"
          if [ -d "$HOME/Qt/${QT_VERSION}/gcc_64" ]; then echo "Qt already cached"; else python -m aqt install-qt --outputdir "$HOME/Qt" linux desktop ${QT_VERSION} linux_gcc_64; fi
          if [ -d "$HOME/Qt/Tools/QtInstallerFramework" ]; then echo "Qt IFW cached"; else python -m aqt install-tool --outputdir "$HOME/Qt" linux desktop tools_ifw qt.tools.ifw.47; fi
          ls -la "$HOME/Qt" || true

      - name: Cache atlas_deps (download archives)
        if: steps.cache-extlibs.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: |
            atlas_deps
          key: ${{ runner.os }}-atlasdeps-${{ hashFiles('util/atlas_deps_filelist.py') }}
          restore-keys: |
            ${{ runner.os }}-atlasdeps-

      - name: Build external deps
        # Only rebuild external deps when we did not get an exact cache hit
        if: steps.cache-extlibs.outputs.cache-hit != 'true'
        shell: bash -l {0}
        env:
          ATLAS_CLANG_MAJOR: ${{ env.CLANG_MAJOR }}
        run: |
          cd "$GITHUB_WORKSPACE"
          python util/build_ext_libs.py all --exclude-libs conda-zimg

  build:
    runs-on: ubuntu-22.04
    needs: build-env
    permissions:
      contents: write
    steps:
      - name: Disable Git autocrlf
        shell: bash -l {0}
        run: |
          git config --global core.autocrlf false

      - uses: actions/checkout@v5
        with:
          # Fetch full history and tags so git_describe works
          ref: ${{ github.event_name == 'create' && github.event.ref || github.ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Free disk space
        shell: bash -l {0}
        run: |
          set -euo pipefail
          echo "Disk usage before cleanup:" && df -h || true
          # Remove large preinstalled stacks we don't use
          sudo rm -rf /usr/lib/jvm
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/julia*
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          # Docker images and apt caches
          docker system prune -af || true
          docker builder prune -af || true
          echo "Disk usage after cleanup:" && df -h || true

      - name: Install base packages
        shell: bash -l {0}
        run: |
          df -h
          sudo apt-get -y update
          sudo apt-get -y install \
            curl wget ca-certificates gnupg lsb-release software-properties-common \
            zsh build-essential git zip unzip rsync p7zip-full \
            nasm gperf patchelf \
            libgl1-mesa-dev libxrender-dev libxcursor-dev libglfw3-dev \
            libfreetype6-dev libfontconfig1-dev \
            libxkbcommon0 libxkbcommon-x11-0 \
            libxcb-xinerama0 libxcb-icccm4 libxcb-keysyms1 libxcb-image0 \
            libxcb-render-util0 libxcb-shape0 libxcb-xkb1 \
            unrar \
            golang-go
          g++ --version
          df -h

      - name: Install LLVM clang
        shell: bash -l {0}
        run: |
          curl -fsSL https://apt.llvm.org/llvm.sh -o /tmp/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh ${CLANG_MAJOR}
          sudo apt-get -y install clang-${CLANG_MAJOR} lld-${CLANG_MAJOR} clang-tools-${CLANG_MAJOR}
          clang-${CLANG_MAJOR} --version

      - name: Install Intel oneAPI MKL/TBB (apt)
        shell: bash -l {0}
        run: |
          set -euo pipefail
          sudo mkdir -p /usr/share/keyrings
          # Follow Intel's official instructions to fetch and dearmor the key
          wget -O- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB \
            | gpg --dearmor | sudo tee /usr/share/keyrings/oneapi-archive-keyring.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/oneapi-archive-keyring.gpg] https://apt.repos.intel.com/oneapi all main" | \
            sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update -o Acquire::Retries=3
          sudo apt-get -y install intel-oneapi-mkl-devel intel-oneapi-tbb-devel || { echo "oneAPI apt install failed" >&2; exit 1; }
          # Hard fail if expected directories are missing so the job stops here
          test -d /opt/intel/oneapi || { echo "/opt/intel/oneapi not found" >&2; exit 1; }
          test -d /opt/intel/oneapi/tbb/latest/lib/cmake/tbb || { echo "TBB CMake config missing" >&2; exit 1; }

      - name: Cache Vulkan SDK (installed)
        uses: actions/cache@v4
        with:
          path: |
            ~/VulkanSDK/${{ env.VULKAN_SDK_VERSION }}
          key: ${{ runner.os }}-vulkan-${{ env.VULKAN_SDK_VERSION }}

      - name: Install Vulkan SDK (LunarG)
        shell: bash -l {0}
        run: |
          mkdir -p "$HOME/VulkanSDK"
          cd "$HOME/VulkanSDK"
          if [ -d "$HOME/VulkanSDK/${VULKAN_SDK_VERSION}" ]; then echo "Vulkan SDK cached"; else \
            SDK_TAR="vulkansdk-linux-x86_64-${VULKAN_SDK_VERSION}.tar.xz"; \
            curl -fL "https://sdk.lunarg.com/sdk/download/${VULKAN_SDK_VERSION}/linux/${SDK_TAR}?Human=true" -o "${SDK_TAR}"; \
            tar -xJf "${SDK_TAR}"; \
            rm -f "${SDK_TAR}"; \
          fi
          ls -la "$HOME/VulkanSDK"

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.12"
          activate-environment: atlas-ci
          miniconda-version: "latest"
          channels: defaults

      - name: Show Python version
        shell: bash -l {0}
        run: |
          python -V
          which python
          pip --version

      - name: Cache conda pkgs
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.CONDA }}/pkgs
            ~/.conda/pkgs
          key: ${{ runner.os }}-condapkgs-3.12

      - name: Install conda tooling
        shell: bash -l {0}
        run: |
          conda info
          conda update --all -y
          conda install -y anaconda-client conda-build pip
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir aqtinstall requests packaging openai openai-agents grpcio-tools grpcio protobuf jsonschema build twine
          conda clean --all -y

      - name: Cache Qt (installed)
        uses: actions/cache@v4
        with:
          path: |
            ~/Qt/${{ env.QT_VERSION }}
            ~/Qt/Tools/QtInstallerFramework
          key: ${{ runner.os }}-qt-${{ env.QT_VERSION }}

      - name: Install Qt 6 (aqt)
        shell: bash -l {0}
        run: |
          # Match readme.md recommendation for Linux
          mkdir -p "$HOME/Qt"
          if [ -d "$HOME/Qt/${QT_VERSION}/gcc_64" ]; then echo "Qt already cached"; else python -m aqt install-qt --outputdir "$HOME/Qt" linux desktop ${QT_VERSION} linux_gcc_64; fi
          if [ -d "$HOME/Qt/Tools/QtInstallerFramework" ]; then echo "Qt IFW cached"; else python -m aqt install-tool --outputdir "$HOME/Qt" linux desktop tools_ifw qt.tools.ifw.47; fi
          ls -la "$HOME/Qt" || true

      - name: Cache 3rdparty build
        uses: actions/cache@v4
        with:
          path: |
            src/3rdparty/build
          key: ${{ runner.os }}-ext-${{ env.CLANG_MAJOR }}-${{ hashFiles('util/atlas_deps_filelist.py','util/build_ext_libs.py') }}

      - name: Cache atlas_deps (download archives)
        uses: actions/cache@v4
        with:
          path: |
            atlas_deps
          key: ${{ runner.os }}-atlasdeps-${{ hashFiles('util/atlas_deps_filelist.py') }}
          restore-keys: |
            ${{ runner.os }}-atlasdeps-

      - name: Cache atlas test data
        uses: actions/cache@v4
        with:
          enableCrossOsArchive: true
          path: |
            atlas_test_data
          key: ${{ format('testdata-{0}', hashFiles('util/atlas_test_data_filelist.py')) }}
          restore-keys: |
            testdata-

      - name: Build and deploy Atlas
        shell: bash -l {0}
        env:
          ATLAS_CLANG_MAJOR: ${{ env.CLANG_MAJOR }}
        run: |
          cd "$GITHUB_WORKSPACE"
          python util/build_and_deploy_atlas.py

      - name: Create or update release and upload assets (gh CLI)
        if: github.event_name == 'create' && github.ref_type == 'tag' && startsWith(github.event.ref, 'v')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.ref }}
        shell: bash -l {0}
        run: |
          set -euo pipefail
          TAG="${TAG_NAME:-${GITHUB_REF#refs/tags/}}"
          echo "Creating/updating release for tag: $TAG"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists"
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes
          fi
          shopt -s nullglob
          files=(deploy/AtlasInstaller*.zip deploy/atlas-*.zip)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No release zip files found under deploy/" >&2
            exit 1
          fi
          gh release upload "$TAG" "${files[@]}" --clobber

      - name: Setup SSH key
        shell: bash -l {0}
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/private.key
          chmod 600 ~/.ssh/private.key
          # Append CI known_hosts entries; do not clobber existing user configuration
          if [ -n "${SSH_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
          fi

      - name: Deploy artifacts
        shell: bash -l {0}
        env:
          SSH_SERVER: ${{ secrets.SSH_SERVER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_DEPLOY_PATH: ${{ secrets.SSH_DEPLOY_PATH }}
        run: |
          cd "$GITHUB_WORKSPACE/deploy"
          rsync -avv --delete -e "ssh -p $SSH_PORT -i ~/.ssh/private.key" ${{ runner.os }} $SSH_USERNAME@$SSH_SERVER:$SSH_DEPLOY_PATH/packages/
          rsync -tvv -e "ssh -p $SSH_PORT -i ~/.ssh/private.key" AtlasInstaller*.zip $SSH_USERNAME@$SSH_SERVER:$SSH_DEPLOY_PATH/installers/

      - name: Build and upload conda zimg
        shell: bash -l {0}
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
          ATLAS_CLANG_MAJOR: ${{ env.CLANG_MAJOR }}
        run: |
          cd "$GITHUB_WORKSPACE"
          python util/build_ext_libs.py conda-zimg
          conda config --set anaconda_upload yes
          conda-build --token $ANACONDA_API_TOKEN --user fenglab zimg-recipe

      - name: Build zimg PyPI artifacts (wheel + sdist)
        if: github.event_name == 'create' && github.ref_type == 'tag' && startsWith(github.event.ref, 'v')
        shell: bash -l {0}
        working-directory: python/zimg
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "Detected tag: $TAG -> zimg version: $VERSION"
          export VERSION="$VERSION"
          python - << 'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ.get("VERSION")
          if not version:
              raise SystemExit("VERSION environment variable is not set")

          pyproject = Path("pyproject.toml")
          text = pyproject.read_text(encoding="utf-8")
          new_text, count = re.subn(
              r'(?m)^version\\s*=\\s*\"[^\"]*\"',
              f'version = "{version}"',
              text,
          )
          if count == 0:
              raise SystemExit("Failed to update version in pyproject.toml")
          pyproject.write_text(new_text, encoding="utf-8")
          print(f"Updated pyproject.toml to version {version}")
          PY
          python -m pip install --upgrade pip
          # Ensure build backend is available (redundant if Install conda tooling ran in this job)
          python -m pip install --no-cache-dir build twine
          rm -rf dist
          python -m build
          ls -R dist

      - name: Upload zimg to PyPI
        if: github.event_name == 'create' && github.ref_type == 'tag' && startsWith(github.event.ref, 'v')
        shell: bash -l {0}
        working-directory: python/zimg
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          set -euo pipefail
          python -m twine upload dist/*
