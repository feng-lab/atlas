name: Linux

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'python/atlas_agent/**'
      - 'LICENSE'
      - 'NOTICE'
  create:
    # Runs when a branch or tag is created; jobs are gated to tags (skip branch creates)
  workflow_dispatch:

concurrency:
  # Cancel any in-progress run for the same ref (branch or tag),
  # regardless of commit SHA. For create tag events, use the tag ref.
  group: atlas-${{ github.workflow }}-${{ github.event_name == 'create' && format('refs/tags/{0}', github.event.ref) || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Pin a Vulkan SDK version
  VULKAN_SDK_VERSION: 1.4.328.1
  # Choose LLVM/Clang major version; mirrored in build scripts via ATLAS_CLANG_MAJOR
  CLANG_MAJOR: "22"
  # Centralize Qt version to make upgrades easy
  QT_VERSION: "6.9.2"
  # Minimum Python version used by CI build environments
  PYTHON_VERSION_MIN: "3.12"

jobs:
  build-env:
    runs-on: ubuntu-22.04
    if: ${{ github.event_name != 'create' || github.ref_type == 'tag' }}
    steps:
      - name: Disable Git autocrlf
        shell: bash -l {0}
        run: |
          git config --global core.autocrlf false

      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'create' && github.event.ref || github.ref }}
          fetch-depth: 1
          submodules: recursive

      - name: Load CI env (masked)
        uses: ./.github/actions/load-dotenv
        with:
          dotenv: ${{ secrets.ATLAS_ENV_LOCAL }}
          
      - name: Cache 3rdparty build
        id: cache-extlibs
        uses: actions/cache@v5
        with:
          path: |
            src/3rdparty/build
          key: ${{ runner.os }}-ext-${{ env.CLANG_MAJOR }}-${{ hashFiles('util/atlas_deps_filelist.py') }}

      - name: Free disk space
        if: steps.cache-extlibs.outputs.cache-hit != 'true'
        shell: bash -l {0}
        run: |
          set -euo pipefail
          echo "Disk usage before cleanup:" && df -h || true
          # Remove large preinstalled stacks we don't use
          sudo rm -rf /usr/lib/jvm
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/julia*
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          # Docker images and apt caches
          docker system prune -af || true
          docker builder prune -af || true
          echo "Disk usage after cleanup:" && df -h || true

      - name: Install base packages
        if: steps.cache-extlibs.outputs.cache-hit != 'true'
        shell: bash -l {0}
        run: |
          df -h
          sudo apt-get -y update
          sudo apt-get -y install \
            curl wget ca-certificates gnupg lsb-release software-properties-common \
            zsh build-essential git zip unzip rsync p7zip-full \
            nasm gperf patchelf \
            libcurl4-openssl-dev \
            libgl1-mesa-dev libxrender-dev libxcursor-dev libglfw3-dev \
            libfreetype6-dev libfontconfig1-dev \
            libxkbcommon0 libxkbcommon-x11-0 \
            libxcb-xinerama0 libxcb-icccm4 libxcb-keysyms1 libxcb-image0 \
            libxcb-render-util0 libxcb-shape0 libxcb-xkb1 \
            unrar \
            golang-go
          g++ --version
          df -h

      - name: Install LLVM clang
        if: steps.cache-extlibs.outputs.cache-hit != 'true'
        shell: bash -l {0}
        run: |
          curl -fsSL https://apt.llvm.org/llvm.sh -o /tmp/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh ${CLANG_MAJOR}
          sudo apt-get -y install clang-${CLANG_MAJOR} lld-${CLANG_MAJOR} clang-tools-${CLANG_MAJOR}
          clang-${CLANG_MAJOR} --version

      - name: Install Intel oneAPI MKL/TBB (apt)
        if: steps.cache-extlibs.outputs.cache-hit != 'true'
        shell: bash -l {0}
        run: |
          set -euo pipefail
          sudo mkdir -p /usr/share/keyrings
          # Follow Intel's official instructions to fetch and dearmor the key
          wget -O- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB \
            | gpg --dearmor | sudo tee /usr/share/keyrings/oneapi-archive-keyring.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/oneapi-archive-keyring.gpg] https://apt.repos.intel.com/oneapi all main" | \
            sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update -o Acquire::Retries=3
          sudo apt-get -y install intel-oneapi-mkl-devel intel-oneapi-tbb-devel || { echo "oneAPI apt install failed" >&2; exit 1; }
          # Hard fail if expected directories are missing so the job stops here
          test -d /opt/intel/oneapi || { echo "/opt/intel/oneapi not found" >&2; exit 1; }
          test -d /opt/intel/oneapi/tbb/latest/lib/cmake/tbb || { echo "TBB CMake config missing" >&2; exit 1; }

      - name: Cache Vulkan SDK (installed)
        if: steps.cache-extlibs.outputs.cache-hit != 'true'
        uses: actions/cache@v5
        with:
          path: |
            ~/VulkanSDK/${{ env.VULKAN_SDK_VERSION }}
          key: ${{ runner.os }}-vulkan-${{ env.VULKAN_SDK_VERSION }}

      - name: Install Vulkan SDK (LunarG)
        if: steps.cache-extlibs.outputs.cache-hit != 'true'
        shell: bash -l {0}
        run: |
          mkdir -p "$HOME/VulkanSDK"
          cd "$HOME/VulkanSDK"
          if [ -d "$HOME/VulkanSDK/${VULKAN_SDK_VERSION}" ]; then echo "Vulkan SDK cached"; else \
            SDK_TAR="vulkansdk-linux-x86_64-${VULKAN_SDK_VERSION}.tar.xz"; \
            curl -fL "https://sdk.lunarg.com/sdk/download/${VULKAN_SDK_VERSION}/linux/${SDK_TAR}?Human=true" -o "${SDK_TAR}"; \
            tar -xJf "${SDK_TAR}"; \
            rm -f "${SDK_TAR}"; \
          fi
          ls -la "$HOME/VulkanSDK"

      - name: Detect existing conda
        if: steps.cache-extlibs.outputs.cache-hit != 'true'
        id: detect-conda-linux-be
        shell: bash
        run: |
          if command -v conda >/dev/null 2>&1; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Miniconda
        if: steps.cache-extlibs.outputs.cache-hit != 'true' && steps.detect-conda-linux-be.outputs.found != 'true'
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: ${{ env.PYTHON_VERSION_MIN }}
          miniconda-version: "latest"
          channels: defaults

      - name: Create/Reset atlas-ci conda env
        if: steps.cache-extlibs.outputs.cache-hit != 'true'
        shell: bash -l {0}
        run: |
          conda info || true
          conda env remove -n atlas-ci -y || true
          conda create -n atlas-ci -y python=${{ env.PYTHON_VERSION_MIN }}

      - name: Install conda tooling
        if: steps.cache-extlibs.outputs.cache-hit != 'true'
        shell: bash -l {0}
        run: |
          eval "$(conda shell.bash hook)"
          conda activate atlas-ci
          conda info
          conda update --all -y
          conda install -y anaconda-client conda-build pip
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir aqtinstall requests packaging boto3
          conda clean --all -y

      - name: Cache Qt (installed)
        if: steps.cache-extlibs.outputs.cache-hit != 'true'
        uses: actions/cache@v5
        with:
          path: |
            ~/Qt/${{ env.QT_VERSION }}
            ~/Qt/Tools/QtInstallerFramework
          key: ${{ runner.os }}-qt-${{ env.QT_VERSION }}

      - name: Install Qt 6 (aqt)
        if: steps.cache-extlibs.outputs.cache-hit != 'true'
        shell: bash -l {0}
        run: |
          eval "$(conda shell.bash hook)"
          conda activate atlas-ci
          # Match readme.md recommendation for Linux
          mkdir -p "$HOME/Qt"
          if [ -d "$HOME/Qt/${QT_VERSION}/gcc_64" ]; then echo "Qt already cached"; else python -m aqt install-qt --outputdir "$HOME/Qt" linux desktop ${QT_VERSION} linux_gcc_64; fi
          if [ -d "$HOME/Qt/Tools/QtInstallerFramework" ]; then echo "Qt IFW cached"; else python -m aqt install-tool --outputdir "$HOME/Qt" linux desktop tools_ifw qt.tools.ifw.47; fi
          ls -la "$HOME/Qt" || true

      - name: Cache atlas_deps (download archives)
        if: steps.cache-extlibs.outputs.cache-hit != 'true'
        uses: actions/cache@v5
        with:
          path: |
            atlas_deps
          key: ${{ runner.os }}-atlasdeps-${{ hashFiles('util/atlas_deps_filelist.py') }}
          restore-keys: |
            ${{ runner.os }}-atlasdeps-

      - name: Build external deps
        # Only rebuild external deps when we did not get an exact cache hit
        if: steps.cache-extlibs.outputs.cache-hit != 'true'
        shell: bash -l {0}
        env:
          ATLAS_CLANG_MAJOR: ${{ env.CLANG_MAJOR }}
        run: |
          set -euo pipefail
          eval "$(conda shell.bash hook)"
          conda activate atlas-ci
          cd "$GITHUB_WORKSPACE"
          python util/build_ext_libs.py all

  build:
    runs-on: ubuntu-22.04
    needs: build-env
    if: ${{ github.event_name != 'create' || github.ref_type == 'tag' }}
    permissions:
      contents: write
    steps:
      - name: Disable Git autocrlf
        shell: bash -l {0}
        run: |
          git config --global core.autocrlf false

      - uses: actions/checkout@v5
        with:
          # Fetch full history and tags so git_describe works
          ref: ${{ github.event_name == 'create' && github.event.ref || github.ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Load CI env (masked)
        uses: ./.github/actions/load-dotenv
        with:
          dotenv: ${{ secrets.ATLAS_ENV_LOCAL }}

      - name: Free disk space
        shell: bash -l {0}
        run: |
          set -euo pipefail
          echo "Disk usage before cleanup:" && df -h || true
          # Remove large preinstalled stacks we don't use
          sudo rm -rf /usr/lib/jvm
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/julia*
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          # Docker images and apt caches
          docker system prune -af || true
          docker builder prune -af || true
          echo "Disk usage after cleanup:" && df -h || true

      - name: Install base packages
        shell: bash -l {0}
        run: |
          df -h
          sudo apt-get -y update
          sudo apt-get -y install \
            curl wget ca-certificates gnupg lsb-release software-properties-common \
            zsh build-essential git zip unzip rsync p7zip-full \
            nasm gperf patchelf \
            libcurl4-openssl-dev \
            libgl1-mesa-dev libxrender-dev libxcursor-dev libglfw3-dev \
            libfreetype6-dev libfontconfig1-dev \
            libxkbcommon0 libxkbcommon-x11-0 \
            libxcb-xinerama0 libxcb-icccm4 libxcb-keysyms1 libxcb-image0 \
            libxcb-render-util0 libxcb-shape0 libxcb-xkb1 \
            unrar \
            golang-go
          g++ --version
          df -h

      - name: Install LLVM clang
        shell: bash -l {0}
        run: |
          curl -fsSL https://apt.llvm.org/llvm.sh -o /tmp/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh ${CLANG_MAJOR}
          sudo apt-get -y install clang-${CLANG_MAJOR} lld-${CLANG_MAJOR} clang-tools-${CLANG_MAJOR}
          clang-${CLANG_MAJOR} --version

      - name: Install Intel oneAPI MKL/TBB (apt)
        shell: bash -l {0}
        run: |
          set -euo pipefail
          sudo mkdir -p /usr/share/keyrings
          # Follow Intel's official instructions to fetch and dearmor the key
          wget -O- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB \
            | gpg --dearmor | sudo tee /usr/share/keyrings/oneapi-archive-keyring.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/oneapi-archive-keyring.gpg] https://apt.repos.intel.com/oneapi all main" | \
            sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update -o Acquire::Retries=3
          sudo apt-get -y install intel-oneapi-mkl-devel intel-oneapi-tbb-devel || { echo "oneAPI apt install failed" >&2; exit 1; }
          # Hard fail if expected directories are missing so the job stops here
          test -d /opt/intel/oneapi || { echo "/opt/intel/oneapi not found" >&2; exit 1; }
          test -d /opt/intel/oneapi/tbb/latest/lib/cmake/tbb || { echo "TBB CMake config missing" >&2; exit 1; }

      - name: Cache Vulkan SDK (installed)
        uses: actions/cache@v5
        with:
          path: |
            ~/VulkanSDK/${{ env.VULKAN_SDK_VERSION }}
          key: ${{ runner.os }}-vulkan-${{ env.VULKAN_SDK_VERSION }}

      - name: Install Vulkan SDK (LunarG)
        shell: bash -l {0}
        run: |
          mkdir -p "$HOME/VulkanSDK"
          cd "$HOME/VulkanSDK"
          if [ -d "$HOME/VulkanSDK/${VULKAN_SDK_VERSION}" ]; then echo "Vulkan SDK cached"; else \
            SDK_TAR="vulkansdk-linux-x86_64-${VULKAN_SDK_VERSION}.tar.xz"; \
            curl -fL "https://sdk.lunarg.com/sdk/download/${VULKAN_SDK_VERSION}/linux/${SDK_TAR}?Human=true" -o "${SDK_TAR}"; \
            tar -xJf "${SDK_TAR}"; \
            rm -f "${SDK_TAR}"; \
          fi
          ls -la "$HOME/VulkanSDK"

      - name: Detect existing conda
        id: detect-conda-linux
        shell: bash
        run: |
          if command -v conda >/dev/null 2>&1; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Miniconda
        if: steps.detect-conda-linux.outputs.found != 'true'
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: ${{ env.PYTHON_VERSION_MIN }}
          miniconda-version: "latest"
          channels: defaults

      - name: Create/Reset atlas-ci conda env
        shell: bash -l {0}
        run: |
          conda info || true
          conda env remove -n atlas-ci -y || true
          conda create -n atlas-ci -y python=${{ env.PYTHON_VERSION_MIN }}

      - name: Install conda tooling
        shell: bash -l {0}
        run: |
          eval "$(conda shell.bash hook)"
          conda activate atlas-ci
          conda info
          conda update --all -y
          conda install -y anaconda-client conda-build pip
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir aqtinstall requests packaging build twine boto3
          conda clean --all -y

      - name: Cache Qt (installed)
        uses: actions/cache@v5
        with:
          path: |
            ~/Qt/${{ env.QT_VERSION }}
            ~/Qt/Tools/QtInstallerFramework
          key: ${{ runner.os }}-qt-${{ env.QT_VERSION }}

      - name: Install Qt 6 (aqt)
        shell: bash -l {0}
        run: |
          eval "$(conda shell.bash hook)"
          conda activate atlas-ci
          # Match readme.md recommendation for Linux
          mkdir -p "$HOME/Qt"
          if [ -d "$HOME/Qt/${QT_VERSION}/gcc_64" ]; then echo "Qt already cached"; else python -m aqt install-qt --outputdir "$HOME/Qt" linux desktop ${QT_VERSION} linux_gcc_64; fi
          if [ -d "$HOME/Qt/Tools/QtInstallerFramework" ]; then echo "Qt IFW cached"; else python -m aqt install-tool --outputdir "$HOME/Qt" linux desktop tools_ifw qt.tools.ifw.47; fi
          ls -la "$HOME/Qt" || true

      - name: Cache 3rdparty build
        uses: actions/cache@v5
        with:
          path: |
            src/3rdparty/build
          key: ${{ runner.os }}-ext-${{ env.CLANG_MAJOR }}-${{ hashFiles('util/atlas_deps_filelist.py') }}

      - name: Cache atlas_deps (download archives)
        uses: actions/cache@v5
        with:
          path: |
            atlas_deps
          key: ${{ runner.os }}-atlasdeps-${{ hashFiles('util/atlas_deps_filelist.py') }}
          restore-keys: |
            ${{ runner.os }}-atlasdeps-

      - name: Cache atlas test data
        uses: actions/cache@v5
        with:
          enableCrossOsArchive: true
          path: |
            atlas_test_data
          key: ${{ format('testdata-{0}', hashFiles('util/atlas_test_data_filelist.py')) }}
          restore-keys: |
            testdata-

      - name: Build and deploy Atlas
        shell: bash -l {0}
        env:
          ATLAS_CLANG_MAJOR: ${{ env.CLANG_MAJOR }}
        run: |
          eval "$(conda shell.bash hook)"
          conda activate atlas-ci
          cd "$GITHUB_WORKSPACE"
          python util/build_and_deploy_atlas.py

      - name: Create or update release and upload assets (gh CLI)
        if: github.event_name == 'create' && github.ref_type == 'tag' && startsWith(github.event.ref, 'v')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.ref }}
        shell: bash -l {0}
        run: |
          set -euo pipefail

          retry() {
            local attempts="${1:?attempts missing}"
            local base_delay="${2:?base_delay missing}"
            local max_delay="${3:?max_delay missing}"
            shift 3
            local attempt=1
            while true; do
              if "$@"; then
                return 0
              fi
              local rc=$?
              if [ "$attempt" -ge "$attempts" ]; then
                echo "Command failed after ${attempts} attempts (exit ${rc}): ${1:-<unknown>}" >&2
                return "$rc"
              fi
              local sleep_for=$(( base_delay * (2 ** (attempt - 1)) ))
              if [ "$sleep_for" -gt "$max_delay" ]; then
                sleep_for="$max_delay"
              fi
              echo "Command failed (exit ${rc}); retrying in ${sleep_for}s (${attempt}/${attempts}): ${1:-<unknown>}" >&2
              sleep "$sleep_for"
              attempt=$(( attempt + 1 ))
            done
          }

          publish_release() {
            TAG="${TAG_NAME:-${GITHUB_REF#refs/tags/}}"
            echo "Creating/updating release for tag: $TAG"

            if gh release view "$TAG" >/dev/null 2>&1; then
              echo "Release $TAG already exists"
            else
              # `gh release view` can fail due to transient GitHub/network issues. If create fails,
              # re-check whether the release exists before aborting.
              if ! gh release create "$TAG" --title "$TAG" --generate-notes; then
                if gh release view "$TAG" >/dev/null 2>&1; then
                  echo "Release $TAG exists after failed create; continuing"
                else
                  return 1
                fi
              fi
            fi

            shopt -s nullglob
            files=(deploy/AtlasInstaller*.zip deploy/atlas-*.zip)
            if [ ${#files[@]} -eq 0 ]; then
              echo "No release zip files found under deploy/" >&2
              return 1
            fi
            gh release upload "$TAG" "${files[@]}" --clobber
          }

          retry 5 5 60 publish_release

      - name: Publish artifacts to R2
        shell: bash -l {0}
        run: |
          eval "$(conda shell.bash hook)"
          conda activate atlas-ci
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          python util/publish_r2.py publish-ifw --os Linux

      - name: Setup SSH key
        shell: bash -l {0}
        run: |
          set -euo pipefail
          if [ -z "${SSH_PRIVATE_KEY_BASE64:-}" ] || [ -z "${SSH_KNOWN_HOSTS_BASE64:-}" ]; then
            echo "Error: SSH_PRIVATE_KEY_BASE64 / SSH_KNOWN_HOSTS_BASE64 are not set. Provide them via the ATLAS_ENV_LOCAL dotenv secret." >&2
            exit 1
          fi

          sshDir="${RUNNER_TEMP:-/tmp}/atlas-ssh"
          mkdir -p "${sshDir}"
          sshKeyPath="${sshDir}/deploy.key"
          knownHostsPath="${sshDir}/known_hosts"

          sshPrivateKeyB64="${SSH_PRIVATE_KEY_BASE64//$'\r'/}"
          sshPrivateKeyB64="${sshPrivateKeyB64//$'\n'/}"
          if [[ "${sshPrivateKeyB64}" == *% ]]; then
            sshPrivateKeyB64="${sshPrivateKeyB64%?}"
          fi
          printf '%s' "$sshPrivateKeyB64" | base64 --decode > "${sshKeyPath}"
          chmod 600 "${sshKeyPath}"

          # Use a temp known_hosts file; do not mutate ~/.ssh on self-hosted runners.
          sshKnownHostsB64="${SSH_KNOWN_HOSTS_BASE64//$'\r'/}"
          sshKnownHostsB64="${sshKnownHostsB64//$'\n'/}"
          if [[ "${sshKnownHostsB64}" == *% ]]; then
            sshKnownHostsB64="${sshKnownHostsB64%?}"
          fi
          printf '%s' "$sshKnownHostsB64" | base64 --decode > "${knownHostsPath}"
          printf '\n' >> "${knownHostsPath}"

          {
            echo "ATLAS__SSH_DIR=${sshDir}"
            echo "ATLAS__SSH_KEY_PATH=${sshKeyPath}"
            echo "ATLAS__SSH_KNOWN_HOSTS_PATH=${knownHostsPath}"
          } >> "$GITHUB_ENV"

      - name: Deploy artifacts
        shell: bash -l {0}
        run: |
          set -euo pipefail

          retry() {
            local attempts="${1:?attempts missing}"
            local base_delay="${2:?base_delay missing}"
            local max_delay="${3:?max_delay missing}"
            shift 3
            local attempt=1
            while true; do
              if "$@"; then
                return 0
              fi
              local rc=$?
              if [ "$attempt" -ge "$attempts" ]; then
                echo "Command failed after ${attempts} attempts (exit ${rc}): ${1:-<unknown>}" >&2
                return "$rc"
              fi
              local sleep_for=$(( base_delay * (2 ** (attempt - 1)) ))
              if [ "$sleep_for" -gt "$max_delay" ]; then
                sleep_for="$max_delay"
              fi
              echo "Command failed (exit ${rc}); retrying in ${sleep_for}s (${attempt}/${attempts}): ${1:-<unknown>}" >&2
              sleep "$sleep_for"
              attempt=$(( attempt + 1 ))
            done
          }

          : "${SSH_SERVER:?Error: SSH_SERVER is not set (ATLAS_ENV_LOCAL)}"
          : "${SSH_PORT:?Error: SSH_PORT is not set (ATLAS_ENV_LOCAL)}"
          : "${SSH_USERNAME:?Error: SSH_USERNAME is not set (ATLAS_ENV_LOCAL)}"
          : "${SSH_DEPLOY_PATH:?Error: SSH_DEPLOY_PATH is not set (ATLAS_ENV_LOCAL)}"
          : "${ATLAS__SSH_KEY_PATH:?Error: ATLAS__SSH_KEY_PATH is not set}"
          : "${ATLAS__SSH_KNOWN_HOSTS_PATH:?Error: ATLAS__SSH_KNOWN_HOSTS_PATH is not set}"

          sshCmd="ssh -p $SSH_PORT -i $ATLAS__SSH_KEY_PATH -o UserKnownHostsFile=$ATLAS__SSH_KNOWN_HOSTS_PATH -o StrictHostKeyChecking=yes -o LogLevel=ERROR"
          cd "$GITHUB_WORKSPACE/deploy"
          retry 5 5 60 rsync -av --delete -e "${sshCmd}" ${{ runner.os }} $SSH_USERNAME@$SSH_SERVER:$SSH_DEPLOY_PATH/packages/
          retry 5 5 60 rsync -tv -e "${sshCmd}" AtlasInstaller*.zip $SSH_USERNAME@$SSH_SERVER:$SSH_DEPLOY_PATH/installers/
          schemaDir="$GITHUB_WORKSPACE/src/atlas/Resources/json/atlas"
          retry 5 5 60 rsync -tv -e "${sshCmd}" \
            "$schemaDir/animation3d.schema.json" \
            "$schemaDir/capabilities.json" \
            "$schemaDir/supported_file_formats.json" \
            $SSH_USERNAME@$SSH_SERVER:$SSH_DEPLOY_PATH/installers/

      - name: Cleanup SSH assets
        if: ${{ always() }}
        shell: bash -l {0}
        run: |
          set -euo pipefail
          if [ -n "${ATLAS__SSH_DIR:-}" ] && [ -d "${ATLAS__SSH_DIR}" ]; then
            rm -rf "${ATLAS__SSH_DIR}" || true
          fi

      - name: Publish atlas-agent to PyPI
        if: github.event_name == 'create' && github.ref_type == 'tag' && startsWith(github.event.ref, 'v')
        shell: bash -l {0}
        run: |
          eval "$(conda shell.bash hook)"
          conda activate atlas-ci
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir build twine
          python util/publish_atlas_agent.py
          ls -R python/atlas_agent/dist

      - name: Publish zimg (PyPI + conda)
        shell: bash -l {0}
        env:
          ATLAS_CLANG_MAJOR: ${{ env.CLANG_MAJOR }}
        run: |
          eval "$(conda shell.bash hook)"
          conda activate atlas-ci
          set -euo pipefail
          # Ensure build backend is available (redundant if Install conda tooling ran in this job)
          python -m pip install --no-cache-dir build twine auditwheel
          if [ -n "${ANACONDA_API_TOKEN:-}" ]; then
            conda config --set anaconda_upload yes
          fi
          python util/publish_zimg.py
          ls -R python/zimg/dist
