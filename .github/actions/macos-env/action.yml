name: macOS Env Setup
description: Prepare macOS toolchain, 3rdparty cache, and optional external deps by CI job mode.
inputs:
  mode:
    description: "Setup mode: extlibs prepares the 3rdparty cache, build prepares final build tooling without rebuilding extlibs, combined does both."
    required: true
  enable-cache:
    description: Enable actions/cache restore/save (GitHub cache service). If false, uses a local on-disk cache for 3rdparty build outputs.
    required: false
    default: "true"
  python-version:
    description: Python version for the conda env (minimum CI builder version; zimg wheel ABI floor stays on the configured abi3 target)
    required: true
runs:
  using: composite
  steps:
    - name: Validate mode
      shell: bash
      env:
        MODE: ${{ inputs.mode }}
      run: |
        case "${MODE}" in
          extlibs|build|combined)
            ;;
          *)
            echo "Error: unsupported macos-env mode '${MODE}'. Expected one of: extlibs, build, combined." >&2
            exit 1
            ;;
        esac

    - name: Cache 3rdparty build
      id: cache-extlibs
      if: ${{ inputs.enable-cache == 'true' }}
      uses: actions/cache@v5
      with:
        path: |
          src/3rdparty/build
        key: ${{ runner.os }}-ext-${{ hashFiles('util/atlas_deps_filelist.py') }}

    - name: Cache 3rdparty build (local on-disk)
      id: cache-extlibs-local
      if: ${{ inputs.enable-cache == 'false' }}
      shell: bash -l {0}
      env:
        CACHE_KEY: ${{ runner.os }}-ext-${{ hashFiles('util/atlas_deps_filelist.py') }}
        CACHE_PATH_REL: src/3rdparty/build
      run: |
        set -euo pipefail

        cacheRoot="$HOME/Library/Caches/atlas/gha-cache"
        if [ -n "${GITHUB_REPOSITORY:-}" ]; then
          cacheRoot="${cacheRoot}/${GITHUB_REPOSITORY}"
        fi

        archive="${cacheRoot}/${CACHE_KEY}.tar.gz"

        mkdir -p "${cacheRoot}"

        if [ -f "${archive}" ]; then
          echo "Restoring local extlibs cache for '${CACHE_PATH_REL}' from: ${archive}"
          rm -rf -- "${GITHUB_WORKSPACE%/}/${CACHE_PATH_REL}" 2>/dev/null || true
          if tar -C "${GITHUB_WORKSPACE%/}" -xzf "${archive}"; then
            echo "cache-hit=true" >> "$GITHUB_OUTPUT"
          else
            echo "Warning: failed to restore local extlibs cache archive; rebuilding and re-packaging." >&2
            rm -f -- "${archive}" 2>/dev/null || true
            echo "cache-hit=false" >> "$GITHUB_OUTPUT"
          fi
        else
          echo "Local extlibs cache miss for key: ${CACHE_KEY}"
          echo "cache-hit=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Resolve 3rdparty cache state
      id: extlibs-cache
      shell: bash
      env:
        GITHUB_CACHE_HIT: ${{ steps.cache-extlibs.outputs.cache-hit }}
        LOCAL_CACHE_HIT: ${{ steps.cache-extlibs-local.outputs.cache-hit }}
      run: |
        if [ "${GITHUB_CACHE_HIT}" = "true" ] || [ "${LOCAL_CACHE_HIT}" = "true" ]; then
          echo "hit=true" >> "$GITHUB_OUTPUT"
        else
          echo "hit=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Install base packages (Homebrew)
      if: ${{ inputs.mode == 'build' || inputs.mode == 'combined' || steps.extlibs-cache.outputs.hit != 'true' }}
      shell: bash -l {0}
      env:
        HOMEBREW_NO_AUTO_UPDATE: "1"
      run: |
        set -euo pipefail
        # CI stability: avoid Homebrew network updates (and ensure brew install doesn't auto-update).
        # Core tools and build prerequisites for macOS (see readme.md)
        brew install p7zip git golang autoconf || true

    - name: Detect existing conda
      if: ${{ inputs.mode == 'build' || inputs.mode == 'combined' || steps.extlibs-cache.outputs.hit != 'true' }}
      id: detect-conda
      shell: bash
      run: |
        if command -v conda >/dev/null 2>&1; then
          echo "found=true" >> "$GITHUB_OUTPUT"
        else
          echo "found=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Setup Miniconda
      if: ${{ (inputs.mode == 'build' || inputs.mode == 'combined' || steps.extlibs-cache.outputs.hit != 'true') && steps.detect-conda.outputs.found != 'true' }}
      uses: conda-incubator/setup-miniconda@v4
      with:
        auto-update-conda: true
        activate-environment: ""
        auto-activate: false
        channels: defaults

    - name: Create/Reset atlas-ci conda env
      if: ${{ inputs.mode == 'build' || inputs.mode == 'combined' || steps.extlibs-cache.outputs.hit != 'true' }}
      shell: bash -l {0}
      run: |
        conda info || true
        conda env remove -n atlas-ci -y || true
        conda create -n atlas-ci -y python=${{ inputs.python-version }}

    - name: Install conda tooling
      if: ${{ inputs.mode == 'build' || inputs.mode == 'combined' || steps.extlibs-cache.outputs.hit != 'true' }}
      shell: bash -l {0}
      run: |
        eval "$(conda shell.bash hook)"
        conda activate atlas-ci
        conda info
        conda update --all -y
        conda install -y anaconda-client conda-build pip
        python -m pip install --upgrade pip
        python -m pip install --no-cache-dir requests packaging boto3
        conda clean --all -y

    - name: Build external deps
      # Only rebuild external deps when we did not get an exact cache hit
      if: ${{ (inputs.mode == 'extlibs' || inputs.mode == 'combined') && steps.extlibs-cache.outputs.hit != 'true' }}
      shell: bash -l {0}
      run: |
        set -euo pipefail

        eval "$(conda shell.bash hook)"
        conda activate atlas-ci
        cd "$GITHUB_WORKSPACE"
        python util/build_ext_libs.py all

    - name: Save 3rdparty build (local on-disk)
      if: ${{ success() && inputs.enable-cache == 'false' && (inputs.mode == 'extlibs' || inputs.mode == 'combined') && steps.extlibs-cache.outputs.hit != 'true' }}
      shell: bash -l {0}
      env:
        CACHE_KEY: ${{ runner.os }}-ext-${{ hashFiles('util/atlas_deps_filelist.py') }}
        CACHE_PATH_REL: src/3rdparty/build
      run: |
        set -euo pipefail

        src="${GITHUB_WORKSPACE%/}/${CACHE_PATH_REL}"
        if [ ! -d "${src}" ]; then
          echo "Error: expected external deps output directory does not exist: ${src}" >&2
          exit 1
        fi

        cacheRoot="$HOME/Library/Caches/atlas/gha-cache"
        if [ -n "${GITHUB_REPOSITORY:-}" ]; then
          cacheRoot="${cacheRoot}/${GITHUB_REPOSITORY}"
        fi

        mkdir -p "${cacheRoot}"
        archive="${cacheRoot}/${CACHE_KEY}.tar.gz"
        tmpArchive="${archive}.tmp.$$"

        echo "Saving local extlibs cache archive: ${archive}"
        tar -C "${GITHUB_WORKSPACE%/}" -czf "${tmpArchive}" "${CACHE_PATH_REL}"
        mv -f "${tmpArchive}" "${archive}"
