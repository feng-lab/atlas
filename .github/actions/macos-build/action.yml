name: macOS Build and Publish
description: Build Atlas, publish artifacts, and optionally clean up on self-hosted runners.
inputs:
  ssh-private-key:
    description: SSH private key used for artifact deployment.
    required: true
  ssh-known-hosts:
    description: Known hosts entries for SSH.
    required: true
  ssh-server:
    description: SSH server hostname for deployment.
    required: true
  ssh-port:
    description: SSH server port for deployment.
    required: true
  ssh-username:
    description: SSH username for deployment.
    required: true
  ssh-deploy-path:
    description: Target path on the SSH server for deployment.
    required: true
  ssh-server2:
    description: SSH server hostname for secondary deployment.
    required: false
  ssh-port2:
    description: SSH server port for secondary deployment.
    required: false
  ssh-username2:
    description: SSH username for secondary deployment.
    required: false
  ssh-deploy-path2:
    description: Target path on the secondary SSH server for deployment.
    required: false
  anaconda-api-token:
    description: Token for uploading to Anaconda.
    required: true
  pypi-api-token:
    description: Token for uploading to PyPI.
    required: true
runs:
  using: composite
  steps:
    - name: Build and deploy Atlas
      shell: bash -l {0}
      run: |
        eval "$(conda shell.bash hook)"
        conda activate atlas-ci
        cd "$GITHUB_WORKSPACE"
        python util/build_and_deploy_atlas.py

    - name: Create or update release and upload assets (gh CLI)
      if: github.event_name == 'create' && github.ref_type == 'tag' && startsWith(github.event.ref, 'v')
      env:
        GH_TOKEN: ${{ github.token }}
        TAG_NAME: ${{ github.event.ref }}
      shell: bash -l {0}
      run: |
        set -euo pipefail
        TAG="${TAG_NAME:-${GITHUB_REF#refs/tags/}}"
        echo "Creating/updating release for tag: $TAG"
        if gh release view "$TAG" >/dev/null 2>&1; then
          echo "Release $TAG already exists"
        else
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes
        fi
        shopt -s nullglob
        files=(deploy/AtlasInstaller*.zip deploy/atlas-*.zip)
        if [ ${#files[@]} -eq 0 ]; then
          echo "No release zip files found under deploy/" >&2
          exit 1
        fi
        gh release upload "$TAG" "${files[@]}" --clobber

    - name: Setup SSH key
      shell: bash -l {0}
      env:
        SSH_PRIVATE_KEY: ${{ inputs.ssh-private-key }}
        SSH_KNOWN_HOSTS: ${{ inputs.ssh-known-hosts }}
      run: |
        mkdir -p ~/.ssh/
        echo "$SSH_PRIVATE_KEY" > ~/.ssh/private.key
        chmod 600 ~/.ssh/private.key
        # Append CI known_hosts entries; do not clobber existing user configuration
        if [ -n "${SSH_KNOWN_HOSTS:-}" ]; then
          printf '%s\n' "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
        fi

    - name: Deploy artifacts
      shell: bash -l {0}
      env:
        SSH_SERVER: ${{ inputs.ssh-server }}
        SSH_PORT: ${{ inputs.ssh-port }}
        SSH_USERNAME: ${{ inputs.ssh-username }}
        SSH_DEPLOY_PATH: ${{ inputs.ssh-deploy-path }}
      run: |
        cd "$GITHUB_WORKSPACE/deploy"
        rsync -avv --delete -e "ssh -p $SSH_PORT -i ~/.ssh/private.key" ${{ runner.os }} $SSH_USERNAME@$SSH_SERVER:$SSH_DEPLOY_PATH/packages/
        rsync -tvv -e "ssh -p $SSH_PORT -i ~/.ssh/private.key" AtlasInstaller*.zip $SSH_USERNAME@$SSH_SERVER:$SSH_DEPLOY_PATH/installers/

    - name: Deploy artifacts (secondary target)
      shell: bash -l {0}
      env:
        SSH_SERVER: ${{ inputs.ssh-server2 }}
        SSH_PORT: ${{ inputs.ssh-port2 }}
        SSH_USERNAME: ${{ inputs.ssh-username2 }}
        SSH_DEPLOY_PATH: ${{ inputs.ssh-deploy-path2 }}
      run: |
        if [ -z "${SSH_SERVER:-}" ] || [ -z "${SSH_PORT:-}" ] || [ -z "${SSH_USERNAME:-}" ] || [ -z "${SSH_DEPLOY_PATH:-}" ]; then
          echo "Secondary SSH deploy target not fully configured; skipping."
          exit 0
        fi
        cd "$GITHUB_WORKSPACE/deploy"
        rsync -avv --delete -e "ssh -p $SSH_PORT -i ~/.ssh/private.key" ${{ runner.os }} $SSH_USERNAME@$SSH_SERVER:$SSH_DEPLOY_PATH/packages/
        rsync -tvv -e "ssh -p $SSH_PORT -i ~/.ssh/private.key" AtlasInstaller*.zip $SSH_USERNAME@$SSH_SERVER:$SSH_DEPLOY_PATH/installers/

    - name: Build and upload conda zimg
      # Skip this when publishing a PyPI release (tags starting with "v")
      if: github.event_name != 'create' || github.ref_type != 'tag' || !startsWith(github.event.ref, 'v')
      shell: bash -l {0}
      env:
        ANACONDA_API_TOKEN: ${{ inputs.anaconda-api-token }}
      run: |
        eval "$(conda shell.bash hook)"
        conda activate atlas-ci
        cd "$GITHUB_WORKSPACE"
        python util/build_ext_libs.py conda-zimg
        conda config --set anaconda_upload yes
        conda-build --token $ANACONDA_API_TOKEN --user fenglab zimg-recipe

    - name: Build zimg PyPI artifacts (wheel + sdist)
      if: github.event_name == 'create' && github.ref_type == 'tag' && startsWith(github.event.ref, 'v')
      shell: bash -l {0}
      working-directory: python/zimg
      run: |
        eval "$(conda shell.bash hook)"
        conda activate atlas-ci
        set -euo pipefail
        TAG="${GITHUB_REF#refs/tags/}"
        VERSION="${TAG#v}"
        echo "Detected tag: $TAG -> zimg version: $VERSION"
        export VERSION="$VERSION"
        python - << 'PY'
        import os
        import re
        from pathlib import Path

        version = os.environ.get("VERSION")
        if not version:
            raise SystemExit("VERSION environment variable is not set")

        pyproject = Path("pyproject.toml")
        text = pyproject.read_text(encoding="utf-8")
        new_text, count = re.subn(
            r'(?m)^\s*version\s*=\s*"[^"]*"',
            f'version = "{version}"',
            text,
        )
        if count == 0:
            raise SystemExit("Failed to update version in pyproject.toml")
        pyproject.write_text(new_text, encoding="utf-8")
        print(f"Updated pyproject.toml to version {version}")
        PY
        python -m pip install --upgrade pip
        # Ensure build backend is available (redundant if conda tooling already installed)
        python -m pip install --no-cache-dir build twine
        rm -rf dist
        # Build wheel only; we depend on the full atlas repo (src + src/3rdparty)
        # via ZIMG_SRC_DIR instead of a self-contained sdist.
        export ZIMG_SRC_DIR="$GITHUB_WORKSPACE/src/python"
        python -m build --wheel --no-sdist
        ls -R dist

    - name: Upload zimg to PyPI
      if: github.event_name == 'create' && github.ref_type == 'tag' && startsWith(github.event.ref, 'v')
      shell: bash -l {0}
      working-directory: python/zimg
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ inputs.pypi-api-token }}
      run: |
        eval "$(conda shell.bash hook)"
        conda activate atlas-ci
        set -euo pipefail
        python -m twine upload dist/*
