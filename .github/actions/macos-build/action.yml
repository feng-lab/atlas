name: macOS Build and Publish
description: Build Atlas, publish artifacts, and optionally clean up on self-hosted runners.
runs:
  using: composite
  steps:
    - name: Configure macOS signing + notarization
      shell: bash -l {0}
      run: |
        set -euo pipefail

        if [ -z "${MACOS_CODESIGN_IDENTITY:-}" ]; then
          echo "Error: MACOS_CODESIGN_IDENTITY is not set." >&2
          exit 1
        fi
        if [ -z "${MACOS_CODESIGN_P12_BASE64:-}" ] || [ -z "${MACOS_CODESIGN_P12_PASSWORD:-}" ]; then
          echo "Error: MACOS_CODESIGN_P12_BASE64 / MACOS_CODESIGN_P12_PASSWORD are required." >&2
          exit 1
        fi
        if [ -z "${MACOS_NOTARYTOOL_API_KEY_ID:-}" ] || [ -z "${MACOS_NOTARYTOOL_API_ISSUER_ID:-}" ] || [ -z "${MACOS_NOTARYTOOL_API_KEY_P8_BASE64:-}" ]; then
          echo "Error: notarytool API key env vars are required (MACOS_NOTARYTOOL_API_KEY_ID, MACOS_NOTARYTOOL_API_ISSUER_ID, MACOS_NOTARYTOOL_API_KEY_P8_BASE64)." >&2
          exit 1
        fi

        KEYCHAIN_PATH="${RUNNER_TEMP}/atlas-codesign.keychain-db"
        CERT_P12_PATH="${RUNNER_TEMP}/atlas-codesign-cert.p12"
        NOTARY_P8_PATH="${RUNNER_TEMP}/atlas-notary-key.p8"

        eval "$(conda shell.bash hook)"
        conda activate atlas-ci

        export CERT_P12_PATH NOTARY_P8_PATH
        python - << 'PY'
        import base64
        import os
        from pathlib import Path

        def write_b64(env: str, path: str) -> None:
            data = os.environ.get(env)
            if not data:
                raise SystemExit(f"Missing env var: {env}")
            data = data.strip()
            while data.endswith("%"):
                data = data[:-1]
            Path(path).write_bytes(base64.b64decode(data))

        write_b64("MACOS_CODESIGN_P12_BASE64", os.environ["CERT_P12_PATH"])
        write_b64("MACOS_NOTARYTOOL_API_KEY_P8_BASE64", os.environ["NOTARY_P8_PATH"])
        PY

        KEYCHAIN_PASSWORD="$(python -c 'import secrets; print(secrets.token_hex(16))')"
        # On some self-hosted runners, the user may not have a default keychain configured.
        # Treat missing defaults/search-lists as soft state and proceed with a temp keychain.
        ORIG_DEFAULT_KEYCHAIN="$(security default-keychain 2>/dev/null | sed -E 's/^"//; s/"$//' || true)"
        ORIG_KEYCHAIN_LIST="$(
          security list-keychains -d user 2>/dev/null \
            | sed -E 's/^[[:space:]]*\"//; s/\"$//' \
            | grep -F -v -- "${KEYCHAIN_PATH}" \
            || true
        )"
        if [ "${ORIG_DEFAULT_KEYCHAIN}" = "${KEYCHAIN_PATH}" ]; then
          ORIG_DEFAULT_KEYCHAIN=""
        fi

        security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
        security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
        security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
        security import "${CERT_P12_PATH}" -k "${KEYCHAIN_PATH}" -P "${MACOS_CODESIGN_P12_PASSWORD}" -T /usr/bin/codesign -T /usr/bin/security
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"

        # Ensure both login and the temp keychain are searchable (do not drop existing entries).
        security list-keychains -d user -s "${KEYCHAIN_PATH}" ${ORIG_KEYCHAIN_LIST}
        security default-keychain -s "${KEYCHAIN_PATH}"
        # Public CI logs: do not print certificate subjects / Team IDs. Still sanity-check
        # that at least one codesigning identity is available in the temp keychain.
        identityCount="$(
          security find-identity -v -p codesigning "${KEYCHAIN_PATH}" 2>/dev/null \
            | grep -E -c '^[[:space:]]*[0-9]+\\)' \
            || true
        )"
        if [ "${identityCount}" = "0" ]; then
          echo "Error: no codesigning identities found in the temporary keychain. Check MACOS_CODESIGN_IDENTITY and the P12 import step." >&2
          exit 1
        fi
        echo "Codesigning identities available in temp keychain: ${identityCount}"

        {
          echo "MACOS_NOTARYTOOL_API_KEY_PATH=${NOTARY_P8_PATH}"
          echo "ATLAS__CODESIGN_ORIG_DEFAULT_KEYCHAIN=${ORIG_DEFAULT_KEYCHAIN}"
        } >> "$GITHUB_ENV"
        if [ -n "${ORIG_KEYCHAIN_LIST}" ]; then
          {
            echo "ATLAS__CODESIGN_ORIG_KEYCHAIN_LIST<<EOF"
            echo "${ORIG_KEYCHAIN_LIST}"
            echo "EOF"
          } >> "$GITHUB_ENV"
        fi

    - name: Build and deploy Atlas
      shell: bash -l {0}
      run: |
        eval "$(conda shell.bash hook)"
        conda activate atlas-ci
        cd "$GITHUB_WORKSPACE"
        python util/build_and_deploy_atlas.py

    - name: Create or update release and upload assets (gh CLI)
      if: github.event_name == 'create' && github.ref_type == 'tag' && startsWith(github.event.ref, 'v')
      env:
        GH_TOKEN: ${{ github.token }}
        TAG_NAME: ${{ github.event.ref }}
      shell: bash -l {0}
      run: |
        set -euo pipefail

        retry() {
          local attempts="${1:?attempts missing}"
          local base_delay="${2:?base_delay missing}"
          local max_delay="${3:?max_delay missing}"
          shift 3
          local attempt=1
          while true; do
            if "$@"; then
              return 0
            fi
            local rc=$?
            if [ "$attempt" -ge "$attempts" ]; then
              echo "Command failed after ${attempts} attempts (exit ${rc}): ${1:-<unknown>}" >&2
              return "$rc"
            fi
            local sleep_for=$(( base_delay * (2 ** (attempt - 1)) ))
            if [ "$sleep_for" -gt "$max_delay" ]; then
              sleep_for="$max_delay"
            fi
            echo "Command failed (exit ${rc}); retrying in ${sleep_for}s (${attempt}/${attempts}): ${1:-<unknown>}" >&2
            sleep "$sleep_for"
            attempt=$(( attempt + 1 ))
          done
        }

        publish_release() {
          TAG="${TAG_NAME:-${GITHUB_REF#refs/tags/}}"
          echo "Creating/updating release for tag: $TAG"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists"
          else
            # `gh release view` can fail due to transient GitHub/network issues. If create fails,
            # re-check whether the release exists before aborting.
            if ! gh release create "$TAG" --title "$TAG" --generate-notes; then
              if gh release view "$TAG" >/dev/null 2>&1; then
                echo "Release $TAG exists after failed create; continuing"
              else
                return 1
              fi
            fi
          fi

          shopt -s nullglob
          files=(deploy/AtlasInstaller*.zip deploy/atlas-*.zip)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No release zip files found under deploy/" >&2
            return 1
          fi
          gh release upload "$TAG" "${files[@]}" --clobber
        }

        retry 5 5 60 publish_release

    - name: Setup SSH key
      shell: bash -l {0}
      run: |
        set -euo pipefail
        if [ -z "${SSH_PRIVATE_KEY_BASE64:-}" ] || [ -z "${SSH_KNOWN_HOSTS_BASE64:-}" ]; then
          echo "Error: SSH_PRIVATE_KEY_BASE64 / SSH_KNOWN_HOSTS_BASE64 are required for deployment." >&2
          exit 1
        fi

        sshDir="${RUNNER_TEMP:-/tmp}/atlas-ssh"
        mkdir -p "${sshDir}"
        sshKeyPath="${sshDir}/deploy.key"
        knownHostsPath="${sshDir}/known_hosts"

        sshPrivateKeyB64="${SSH_PRIVATE_KEY_BASE64//$'\r'/}"
        sshPrivateKeyB64="${sshPrivateKeyB64//$'\n'/}"
        if [[ "${sshPrivateKeyB64}" == *% ]]; then
          sshPrivateKeyB64="${sshPrivateKeyB64%?}"
        fi
        printf '%s' "$sshPrivateKeyB64" | base64 --decode > "${sshKeyPath}"
        chmod 600 "${sshKeyPath}"

        # Use a temp known_hosts file; do not mutate ~/.ssh on self-hosted runners.
        sshKnownHostsB64="${SSH_KNOWN_HOSTS_BASE64//$'\r'/}"
        sshKnownHostsB64="${sshKnownHostsB64//$'\n'/}"
        if [[ "${sshKnownHostsB64}" == *% ]]; then
          sshKnownHostsB64="${sshKnownHostsB64%?}"
        fi
        printf '%s' "$sshKnownHostsB64" | base64 --decode > "${knownHostsPath}"
        printf '\n' >> "${knownHostsPath}"

        {
          echo "ATLAS__SSH_DIR=${sshDir}"
          echo "ATLAS__SSH_KEY_PATH=${sshKeyPath}"
          echo "ATLAS__SSH_KNOWN_HOSTS_PATH=${knownHostsPath}"
        } >> "$GITHUB_ENV"

    - name: Deploy artifacts
      shell: bash -l {0}
      run: |
        set -euo pipefail

        retry() {
          local attempts="${1:?attempts missing}"
          local base_delay="${2:?base_delay missing}"
          local max_delay="${3:?max_delay missing}"
          shift 3
          local attempt=1
          while true; do
            if "$@"; then
              return 0
            fi
            local rc=$?
            if [ "$attempt" -ge "$attempts" ]; then
              echo "Command failed after ${attempts} attempts (exit ${rc}): ${1:-<unknown>}" >&2
              return "$rc"
            fi
            local sleep_for=$(( base_delay * (2 ** (attempt - 1)) ))
            if [ "$sleep_for" -gt "$max_delay" ]; then
              sleep_for="$max_delay"
            fi
            echo "Command failed (exit ${rc}); retrying in ${sleep_for}s (${attempt}/${attempts}): ${1:-<unknown>}" >&2
            sleep "$sleep_for"
            attempt=$(( attempt + 1 ))
          done
        }

        : "${SSH_SERVER:?Error: SSH_SERVER is not set}"
        : "${SSH_PORT:?Error: SSH_PORT is not set}"
        : "${SSH_USERNAME:?Error: SSH_USERNAME is not set}"
        : "${SSH_DEPLOY_PATH:?Error: SSH_DEPLOY_PATH is not set}"
        : "${ATLAS__SSH_KEY_PATH:?Error: ATLAS__SSH_KEY_PATH is not set}"
        : "${ATLAS__SSH_KNOWN_HOSTS_PATH:?Error: ATLAS__SSH_KNOWN_HOSTS_PATH is not set}"

        sshCmd="ssh -p $SSH_PORT -i $ATLAS__SSH_KEY_PATH -o UserKnownHostsFile=$ATLAS__SSH_KNOWN_HOSTS_PATH -o StrictHostKeyChecking=yes -o LogLevel=ERROR"
        cd "$GITHUB_WORKSPACE/deploy"
        retry 5 5 60 rsync -av --delete -e "${sshCmd}" ${{ runner.os }} $SSH_USERNAME@$SSH_SERVER:$SSH_DEPLOY_PATH/packages/
        retry 5 5 60 rsync -tv -e "${sshCmd}" AtlasInstaller*.zip $SSH_USERNAME@$SSH_SERVER:$SSH_DEPLOY_PATH/installers/

    - name: Deploy artifacts (secondary target)
      shell: bash -l {0}
      run: |
        if [ -z "${SSH_SERVER2:-}" ] || [ -z "${SSH_PORT2:-}" ] || [ -z "${SSH_USERNAME2:-}" ] || [ -z "${SSH_DEPLOY_PATH2:-}" ]; then
          echo "Secondary SSH deploy target not fully configured; skipping."
          exit 0
        fi
        set -euo pipefail

        retry() {
          local attempts="${1:?attempts missing}"
          local base_delay="${2:?base_delay missing}"
          local max_delay="${3:?max_delay missing}"
          shift 3
          local attempt=1
          while true; do
            if "$@"; then
              return 0
            fi
            local rc=$?
            if [ "$attempt" -ge "$attempts" ]; then
              echo "Command failed after ${attempts} attempts (exit ${rc}): ${1:-<unknown>}" >&2
              return "$rc"
            fi
            local sleep_for=$(( base_delay * (2 ** (attempt - 1)) ))
            if [ "$sleep_for" -gt "$max_delay" ]; then
              sleep_for="$max_delay"
            fi
            echo "Command failed (exit ${rc}); retrying in ${sleep_for}s (${attempt}/${attempts}): ${1:-<unknown>}" >&2
            sleep "$sleep_for"
            attempt=$(( attempt + 1 ))
          done
        }

        : "${ATLAS__SSH_KEY_PATH:?Error: ATLAS__SSH_KEY_PATH is not set}"
        : "${ATLAS__SSH_KNOWN_HOSTS_PATH:?Error: ATLAS__SSH_KNOWN_HOSTS_PATH is not set}"

        sshCmd="ssh -p $SSH_PORT2 -i $ATLAS__SSH_KEY_PATH -o UserKnownHostsFile=$ATLAS__SSH_KNOWN_HOSTS_PATH -o StrictHostKeyChecking=yes -o LogLevel=ERROR"
        cd "$GITHUB_WORKSPACE/deploy"
        retry 5 5 60 rsync -av --delete -e "${sshCmd}" ${{ runner.os }} $SSH_USERNAME2@$SSH_SERVER2:$SSH_DEPLOY_PATH2/packages/
        retry 5 5 60 rsync -tv -e "${sshCmd}" AtlasInstaller*.zip $SSH_USERNAME2@$SSH_SERVER2:$SSH_DEPLOY_PATH2/installers/

    - name: Publish zimg (PyPI + conda)
      shell: bash -l {0}
      run: |
        eval "$(conda shell.bash hook)"
        conda activate atlas-ci
        set -euo pipefail
        python -m pip install --upgrade pip
        # Ensure build backend is available (redundant if conda tooling already installed)
        python -m pip install --no-cache-dir build twine
        if [ -n "${ANACONDA_API_TOKEN:-}" ]; then
          conda config --set anaconda_upload yes
        fi
        python util/publish_zimg.py
        ls -R python/zimg/dist

    - name: Cleanup macOS signing assets
      if: ${{ always() }}
      shell: bash -l {0}
      run: |
        set -euo pipefail
        KEYCHAIN_PATH="${RUNNER_TEMP}/atlas-codesign.keychain-db"
        CERT_P12_PATH="${RUNNER_TEMP}/atlas-codesign-cert.p12"
        NOTARY_P8_PATH="${RUNNER_TEMP}/atlas-notary-key.p8"

        restoreDefault=""
        if [ -n "${ATLAS__CODESIGN_ORIG_DEFAULT_KEYCHAIN:-}" ] && [ "${ATLAS__CODESIGN_ORIG_DEFAULT_KEYCHAIN}" != "${KEYCHAIN_PATH}" ] && [ -f "${ATLAS__CODESIGN_ORIG_DEFAULT_KEYCHAIN}" ]; then
          restoreDefault="${ATLAS__CODESIGN_ORIG_DEFAULT_KEYCHAIN}"
        else
          for candidate in "${HOME}/Library/Keychains/login.keychain-db" "${HOME}/Library/Keychains/login.keychain"; do
            if [ "${candidate}" != "${KEYCHAIN_PATH}" ] && [ -f "${candidate}" ]; then
              restoreDefault="${candidate}"
              break
            fi
          done
          if [ -z "${restoreDefault}" ] && [ -f "/Library/Keychains/System.keychain" ]; then
            restoreDefault="/Library/Keychains/System.keychain"
          fi
        fi

        if [ -n "${restoreDefault}" ]; then
          security default-keychain -s "${restoreDefault}" || true
        fi

        if [ -n "${ATLAS__CODESIGN_ORIG_KEYCHAIN_LIST:-}" ]; then
          # shellcheck disable=SC2086
          security list-keychains -d user -s ${ATLAS__CODESIGN_ORIG_KEYCHAIN_LIST} || true
        elif [ -n "${restoreDefault}" ]; then
          security list-keychains -d user -s "${restoreDefault}" || true
        fi

        if [ -f "${KEYCHAIN_PATH}" ]; then
          security delete-keychain "${KEYCHAIN_PATH}" || true
        fi
        if [ -n "${ATLAS__SSH_DIR:-}" ] && [ -d "${ATLAS__SSH_DIR}" ]; then
          rm -rf "${ATLAS__SSH_DIR}" || true
        fi
        rm -f "${NOTARY_P8_PATH}" "${CERT_P12_PATH}" || true
