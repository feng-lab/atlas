name: macOS Build and Publish
description: Install macOS build SDKs, build Atlas, publish artifacts, and optionally clean up on self-hosted runners.
inputs:
  qt-version:
    description: Qt version to install
    required: true
  vulkan-version:
    description: Vulkan SDK version to install/validate
    required: true
  enable-cache:
    description: Enable actions/cache restore/save for build-time SDKs.
    required: false
    default: "true"
  cache-test-data:
    description: Restore/save atlas_test_data through GitHub cache before build_and_deploy_atlas.py.
    required: false
    default: "false"
runs:
  using: composite
  steps:
    - name: Cache Vulkan SDK (installed)
      if: ${{ inputs.enable-cache == 'true' }}
      uses: actions/cache@v5
      with:
        path: |
          ~/VulkanSDK/${{ inputs.vulkan-version }}
        key: ${{ runner.os }}-vulkan-${{ inputs.vulkan-version }}

    - name: Install Vulkan SDK (LunarG macOS CLI)
      shell: bash -l {0}
      env:
        VULKAN_SDK_VERSION: ${{ inputs.vulkan-version }}
      run: |
        set -euo pipefail

        mkdir -p "$HOME/VulkanSDK"
        if [ -d "$HOME/VulkanSDK/${VULKAN_SDK_VERSION}" ]; then
          echo "Vulkan SDK already present under \$HOME/VulkanSDK/${VULKAN_SDK_VERSION}"
          ls -R "$HOME/VulkanSDK/${VULKAN_SDK_VERSION}" || true
          exit 0
        fi

        VULKAN_SDK_MAC_URL="https://sdk.lunarg.com/sdk/download/${VULKAN_SDK_VERSION}/mac/vulkansdk-macos-${VULKAN_SDK_VERSION}.zip"
        ZIP="/tmp/vulkansdk-macos-${VULKAN_SDK_VERSION}.zip"
        echo "Downloading Vulkan SDK from: ${VULKAN_SDK_MAC_URL}"
        /usr/bin/curl -fL "${VULKAN_SDK_MAC_URL}" -o "${ZIP}"

        UNPACK_DIR="/tmp/vulkansdk-macos-${VULKAN_SDK_VERSION}"
        rm -rf "${UNPACK_DIR}"
        mkdir -p "${UNPACK_DIR}"
        /usr/bin/unzip -q "${ZIP}" -d "${UNPACK_DIR}"

        APP_PATH="${UNPACK_DIR}/vulkansdk-macOS-${VULKAN_SDK_VERSION}.app"
        if [ ! -d "${APP_PATH}" ]; then
          echo "Expected app bundle not found at ${APP_PATH}" >&2
          exit 1
        fi

        APP_BIN="${APP_PATH}/Contents/MacOS/vulkansdk-macOS-${VULKAN_SDK_VERSION}"
        if [ ! -x "${APP_BIN}" ]; then
          echo "Vulkan SDK installer binary not executable at ${APP_BIN}" >&2
          exit 1
        fi

        INSTALL_ROOT="$HOME/VulkanSDK/${VULKAN_SDK_VERSION}"
        mkdir -p "${INSTALL_ROOT}"

        echo "Running Vulkan SDK installer CLI (user-level install under \$HOME):"
        echo "  ${APP_BIN} --root \"${INSTALL_ROOT}\" --accept-licenses --default-answer --confirm-command install com.lunarg.vulkan.core com.lunarg.vulkan.vma"

        "${APP_BIN}" \
          --root "${INSTALL_ROOT}" \
          --accept-licenses \
          --default-answer \
          --confirm-command \
          install com.lunarg.vulkan.core com.lunarg.vulkan.vma

        # Remove temporary installer payloads from /tmp to avoid buildup on self-hosted runners.
        rm -rf "${UNPACK_DIR}" "${ZIP}" || true

        ls -R "${INSTALL_ROOT}" || true

    - name: Cache Qt (installed)
      if: ${{ inputs.enable-cache == 'true' }}
      uses: actions/cache@v5
      with:
        path: |
          ~/Qt/${{ inputs.qt-version }}
          ~/Qt/Tools/QtInstallerFramework
        key: ${{ runner.os }}-qt-${{ inputs.qt-version }}

    - name: Install Qt 6 (aqt)
      shell: bash -l {0}
      env:
        QT_VERSION: ${{ inputs.qt-version }}
      run: |
        set -euo pipefail
        eval "$(conda shell.bash hook)"
        conda activate atlas-ci
        python -m pip install --no-cache-dir aqtinstall
        mkdir -p "$HOME/Qt"
        if [ -d "$HOME/Qt/${QT_VERSION}/macos" ]; then
          echo "Qt already cached"
        else
          python -m aqt install-qt --outputdir "$HOME/Qt" mac desktop "${QT_VERSION}" clang_64
        fi
        if [ -d "$HOME/Qt/Tools/QtInstallerFramework" ]; then
          echo "Qt IFW cached"
        else
          bash "${GITHUB_WORKSPACE}/util/install_qt_ifw_macos.sh"
        fi
        ls -la "$HOME/Qt" || true

    - name: Configure macOS signing + notarization
      shell: bash -l {0}
      run: |
        set -euo pipefail

        if [ -z "${MACOS_CODESIGN_IDENTITY:-}" ]; then
          echo "Error: MACOS_CODESIGN_IDENTITY is not set." >&2
          exit 1
        fi
        if [ -z "${MACOS_CODESIGN_P12_BASE64:-}" ] || [ -z "${MACOS_CODESIGN_P12_PASSWORD:-}" ]; then
          echo "Error: MACOS_CODESIGN_P12_BASE64 / MACOS_CODESIGN_P12_PASSWORD are required." >&2
          exit 1
        fi
        if [ -z "${MACOS_NOTARYTOOL_API_KEY_ID:-}" ] || [ -z "${MACOS_NOTARYTOOL_API_ISSUER_ID:-}" ] || [ -z "${MACOS_NOTARYTOOL_API_KEY_P8_BASE64:-}" ]; then
          echo "Error: notarytool API key env vars are required (MACOS_NOTARYTOOL_API_KEY_ID, MACOS_NOTARYTOOL_API_ISSUER_ID, MACOS_NOTARYTOOL_API_KEY_P8_BASE64)." >&2
          exit 1
        fi

        KEYCHAIN_PATH="${RUNNER_TEMP}/atlas-codesign.keychain-db"
        CERT_P12_PATH="${RUNNER_TEMP}/atlas-codesign-cert.p12"
        NOTARY_P8_PATH="${RUNNER_TEMP}/atlas-notary-key.p8"

        eval "$(conda shell.bash hook)"
        conda activate atlas-ci

        export CERT_P12_PATH NOTARY_P8_PATH
        python - << 'PY'
        import base64
        import os
        from pathlib import Path

        def write_b64(env: str, path: str) -> None:
            data = os.environ.get(env)
            if not data:
                raise SystemExit(f"Missing env var: {env}")
            data = data.strip()
            while data.endswith("%"):
                data = data[:-1]
            Path(path).write_bytes(base64.b64decode(data))

        write_b64("MACOS_CODESIGN_P12_BASE64", os.environ["CERT_P12_PATH"])
        write_b64("MACOS_NOTARYTOOL_API_KEY_P8_BASE64", os.environ["NOTARY_P8_PATH"])
        PY

        KEYCHAIN_PASSWORD="$(python -c 'import secrets; print(secrets.token_hex(16))')"
        security_quiet() {
          local subcmd="${1:-<unknown>}"
          # Treat CI logs as public: suppress all output from `security` on both stdout/stderr
          # (some subcommands print keychain/cert metadata even on success).
          if ! security "$@" >/dev/null 2>&1; then
            echo "Error: security ${subcmd} failed (output suppressed for CI log safety)." >&2
            return 1
          fi
          return 0
        }

        # On some self-hosted runners, the user may not have a default keychain configured.
        # Treat missing defaults/search-lists as soft state and proceed with a temp keychain.
        ORIG_DEFAULT_KEYCHAIN="$(security default-keychain 2>/dev/null | sed -E 's/^"//; s/"$//' || true)"
        ORIG_KEYCHAIN_LIST="$(
          security list-keychains -d user 2>/dev/null \
            | sed -E 's/^[[:space:]]*\"//; s/\"$//' \
            | grep -F -v -- "${KEYCHAIN_PATH}" \
            || true
        )"
        if [ "${ORIG_DEFAULT_KEYCHAIN}" = "${KEYCHAIN_PATH}" ]; then
          ORIG_DEFAULT_KEYCHAIN=""
        fi

        security_quiet create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
        security_quiet set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
        security_quiet unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
        security_quiet import "${CERT_P12_PATH}" -k "${KEYCHAIN_PATH}" -P "${MACOS_CODESIGN_P12_PASSWORD}" -T /usr/bin/codesign -T /usr/bin/security
        security_quiet set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"

        # Ensure both login and the temp keychain are searchable (do not drop existing entries).
        # shellcheck disable=SC2086
        security_quiet list-keychains -d user -s "${KEYCHAIN_PATH}" ${ORIG_KEYCHAIN_LIST}
        security_quiet default-keychain -s "${KEYCHAIN_PATH}"
        # Public CI logs: do not print certificate subjects / Team IDs. Sanity-check that
        # the configured identity exists without echoing identities into logs.
        identities=""
        if ! identities="$(security find-identity -v -p codesigning "${KEYCHAIN_PATH}" 2>/dev/null)"; then
          echo "Error: failed to query codesigning identities in the temporary keychain." >&2
          exit 1
        fi
        if ! printf '%s\n' "${identities}" | grep -F -q -- "${MACOS_CODESIGN_IDENTITY}"; then
          echo "Error: MACOS_CODESIGN_IDENTITY does not match any valid codesigning identity in the temporary keychain. Check MACOS_CODESIGN_IDENTITY and the P12 import step." >&2
          exit 1
        fi
        echo "Codesigning identity available in temp keychain."

        {
          echo "MACOS_NOTARYTOOL_API_KEY_PATH=${NOTARY_P8_PATH}"
          echo "ATLAS__CODESIGN_ORIG_DEFAULT_KEYCHAIN=${ORIG_DEFAULT_KEYCHAIN}"
        } >> "$GITHUB_ENV"
        if [ -n "${ORIG_KEYCHAIN_LIST}" ]; then
          {
            echo "ATLAS__CODESIGN_ORIG_KEYCHAIN_LIST<<EOF"
            echo "${ORIG_KEYCHAIN_LIST}"
            echo "EOF"
          } >> "$GITHUB_ENV"
        fi

    - name: Cache atlas test data
      if: ${{ inputs.cache-test-data == 'true' }}
      uses: actions/cache@v5
      with:
        enableCrossOsArchive: true
        path: |
          atlas_test_data
        key: ${{ format('testdata-{0}', hashFiles('util/atlas_test_data_filelist.py')) }}
        restore-keys: |
          testdata-

    - name: Build and deploy Atlas
      shell: bash -l {0}
      run: |
        eval "$(conda shell.bash hook)"
        conda activate atlas-ci
        cd "$GITHUB_WORKSPACE"
        python util/build_and_deploy_atlas.py

    - name: Create or update release and upload assets (gh CLI)
      if: github.event_name == 'create' && github.ref_type == 'tag' && startsWith(github.event.ref, 'v')
      env:
        GH_TOKEN: ${{ github.token }}
        TAG_NAME: ${{ github.event.ref }}
      shell: bash -l {0}
      run: |
        set -euo pipefail

        retry() {
          local attempts="${1:?attempts missing}"
          local base_delay="${2:?base_delay missing}"
          local max_delay="${3:?max_delay missing}"
          shift 3
          local attempt=1
          while true; do
            if "$@"; then
              return 0
            fi
            local rc=$?
            if [ "$attempt" -ge "$attempts" ]; then
              echo "Command failed after ${attempts} attempts (exit ${rc}): ${1:-<unknown>}" >&2
              return "$rc"
            fi
            local sleep_for=$(( base_delay * (2 ** (attempt - 1)) ))
            if [ "$sleep_for" -gt "$max_delay" ]; then
              sleep_for="$max_delay"
            fi
            echo "Command failed (exit ${rc}); retrying in ${sleep_for}s (${attempt}/${attempts}): ${1:-<unknown>}" >&2
            sleep "$sleep_for"
            attempt=$(( attempt + 1 ))
          done
        }

        publish_release() {
          TAG="${TAG_NAME:-${GITHUB_REF#refs/tags/}}"
          echo "Creating/updating release for tag: $TAG"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists"
          else
            # `gh release view` can fail due to transient GitHub/network issues. If create fails,
            # re-check whether the release exists before aborting.
            if ! gh release create "$TAG" --title "$TAG" --generate-notes; then
              if gh release view "$TAG" >/dev/null 2>&1; then
                echo "Release $TAG exists after failed create; continuing"
              else
                return 1
              fi
            fi
          fi

          shopt -s nullglob
          files=(deploy/AtlasInstaller*.zip deploy/atlas-*.zip)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No release zip files found under deploy/" >&2
            return 1
          fi
          gh release upload "$TAG" "${files[@]}" --clobber
        }

        retry 5 5 60 publish_release

    - name: Publish artifacts to R2
      shell: bash -l {0}
      run: |
        eval "$(conda shell.bash hook)"
        conda activate atlas-ci
        set -euo pipefail
        cd "$GITHUB_WORKSPACE"
        python util/publish_r2.py publish-ifw --os macOS

    - name: Deploy artifacts (SSH)
      shell: bash -l {0}
      run: |
        eval "$(conda shell.bash hook)"
        conda activate atlas-ci
        set -euo pipefail
        python util/deploy_artifacts_ssh.py --os ${{ runner.os }}

    - name: Publish zimg (PyPI + conda)
      shell: bash -l {0}
      run: |
        eval "$(conda shell.bash hook)"
        conda activate atlas-ci
        set -euo pipefail
        python -m pip install --upgrade pip
        # Ensure build backend is available (redundant if conda tooling already installed)
        python -m pip install --no-cache-dir build twine
        if [ -n "${ANACONDA_API_TOKEN:-}" ]; then
          conda config --set anaconda_upload yes
        fi
        python util/publish_zimg.py
        ls -R python/zimg/dist

    - name: Cleanup macOS signing assets
      if: ${{ always() }}
      shell: bash -l {0}
      run: |
        set -euo pipefail
        security_quiet() {
          local subcmd="${1:-<unknown>}"
          if ! security "$@" >/dev/null 2>&1; then
            echo "Warning: security ${subcmd} failed during cleanup (output suppressed for CI log safety)." >&2
            return 1
          fi
          return 0
        }
        KEYCHAIN_PATH="${RUNNER_TEMP}/atlas-codesign.keychain-db"
        CERT_P12_PATH="${RUNNER_TEMP}/atlas-codesign-cert.p12"
        NOTARY_P8_PATH="${RUNNER_TEMP}/atlas-notary-key.p8"

        restoreDefault=""
        if [ -n "${ATLAS__CODESIGN_ORIG_DEFAULT_KEYCHAIN:-}" ] && [ "${ATLAS__CODESIGN_ORIG_DEFAULT_KEYCHAIN}" != "${KEYCHAIN_PATH}" ] && [ -f "${ATLAS__CODESIGN_ORIG_DEFAULT_KEYCHAIN}" ]; then
          restoreDefault="${ATLAS__CODESIGN_ORIG_DEFAULT_KEYCHAIN}"
        else
          for candidate in "${HOME}/Library/Keychains/login.keychain-db" "${HOME}/Library/Keychains/login.keychain"; do
            if [ "${candidate}" != "${KEYCHAIN_PATH}" ] && [ -f "${candidate}" ]; then
              restoreDefault="${candidate}"
              break
            fi
          done
          if [ -z "${restoreDefault}" ] && [ -f "/Library/Keychains/System.keychain" ]; then
            restoreDefault="/Library/Keychains/System.keychain"
          fi
        fi

        if [ -n "${restoreDefault}" ]; then
          security_quiet default-keychain -s "${restoreDefault}" || true
        fi

        if [ -n "${ATLAS__CODESIGN_ORIG_KEYCHAIN_LIST:-}" ]; then
          # shellcheck disable=SC2086
          security_quiet list-keychains -d user -s ${ATLAS__CODESIGN_ORIG_KEYCHAIN_LIST} || true
        elif [ -n "${restoreDefault}" ]; then
          security_quiet list-keychains -d user -s "${restoreDefault}" || true
        fi

        if [ -f "${KEYCHAIN_PATH}" ]; then
          security_quiet delete-keychain "${KEYCHAIN_PATH}" || true
        fi
        rm -f "${NOTARY_P8_PATH}" "${CERT_P12_PATH}" || true
