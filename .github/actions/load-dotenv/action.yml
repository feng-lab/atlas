name: Load dotenv into job environment
description: Export environment variables from a workflow-secret dotenv; values are masked and no file is left behind.
inputs:
  dotenv:
    description: Raw contents of the dotenv file (e.g. from a GitHub Actions secret).
    required: true
runs:
  using: composite
  steps:
    - name: Load dotenv (masked)
      shell: bash -l {0}
      env:
        DOTENV_CONTENT: ${{ inputs.dotenv }}
      run: |
        set -euo pipefail

        if [ -z "${DOTENV_CONTENT:-}" ]; then
          echo "Error: load-dotenv action received an empty 'dotenv' input." >&2
          exit 1
        fi

        if [ -z "${GITHUB_ENV:-}" ]; then
          echo "Error: GITHUB_ENV is not set; cannot persist env vars across steps." >&2
          exit 1
        fi

        normalize_windows_path() {
          local path="$1"
          if [[ "${path}" =~ ^[A-Za-z]:[\\\\/] ]]; then
            if command -v cygpath >/dev/null 2>&1; then
              cygpath -u "${path}"
              return 0
            fi
            local drive rest
            drive="$(printf '%s' "${path:0:1}" | tr 'A-Z' 'a-z')"
            rest="${path:2}"
            rest="${rest#\\\\}"
            rest="${rest#/}"
            rest="${rest//\\\\//}"
            printf '/%s/%s' "${drive}" "${rest}"
            return 0
          fi
          printf '%s' "${path}"
        }

        githubEnvPath="$(normalize_windows_path "${GITHUB_ENV}")"

        tmpRoot="${RUNNER_TEMP:-${TMPDIR:-/tmp}}"
        tmpRoot="$(normalize_windows_path "${tmpRoot}")"
        mkdir -p "${tmpRoot}"
        umask 077

        tempDotenvPath="$(mktemp "${tmpRoot%/}/atlas-dotenv.XXXXXX")"
        chmod 600 "${tempDotenvPath}" || true

        cleanup() {
          rm -f -- "${tempDotenvPath}" 2>/dev/null || true
        }
        trap cleanup EXIT

        printf '%s' "${DOTENV_CONTENT}" > "${tempDotenvPath}"

        escape_workflow_command_data() {
          local data="$1"
          data="${data//'%'/'%25'}"
          data="${data//$'\r'/'%0D'}"
          data="${data//$'\n'/'%0A'}"
          printf '%s' "${data}"
        }

        add_mask_line() {
          local line="$1"
          if [ -z "${line}" ]; then
            return 0
          fi
          line="$(escape_workflow_command_data "${line}")"
          printf '::add-mask::%s\n' "${line}"
        }

        add_mask_value() {
          local value="$1"
          if [ -z "${value}" ]; then
            return 0
          fi
          if [[ "${value}" == *$'\n'* ]]; then
            while IFS= read -r line || [ -n "${line}" ]; do
              add_mask_line "${line}"
            done <<< "${value}"
            return 0
          fi
          add_mask_line "${value}"
        }

        # Best-effort: register masks for the raw secret content immediately to reduce log leak risk.
        add_mask_value "${DOTENV_CONTENT}"

        dotenvKeys="$(
          awk '
            /^[[:space:]]*(#|$)/ { next }
            {
              line = $0
              sub(/^[[:space:]]*export[[:space:]]+/, "", line)
              if (match(line, /^[[:space:]]*[A-Za-z_][A-Za-z0-9_]*[[:space:]]*=/)) {
                key = substr(line, RSTART, RLENGTH)
                sub(/[[:space:]]*=[[:space:]]*$/, "", key)
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", key)
                if (!seen[key]++) print key
              }
            }
          ' "${tempDotenvPath}"
        )"

        # Sourcing allows multi-line values (e.g., SSH keys) as long as the file uses valid shell syntax.
        # We temporarily disable `set -u` to avoid failing on benign expansions of unset variables.
        set +u
        set -a
        # shellcheck disable=SC1090
        source "${tempDotenvPath}"
        set +a
        set -u

        if [ -z "${dotenvKeys}" ]; then
          exit 0
        fi

        while IFS= read -r key; do
          if [[ ! "${key}" =~ ^[A-Za-z_][A-Za-z0-9_]*$ ]]; then
            echo "Error: invalid env var name parsed from dotenv: '${key}'" >&2
            exit 1
          fi

          value="${!key-}"
          add_mask_value "${value}"
          if [[ "${value}" == *$'\n'* ]]; then
            delimiter="__ENV_${key}_${RANDOM}_${RANDOM}_$$_$(date +%s)__"
            {
              printf '%s<<%s\n' "${key}" "${delimiter}"
              printf '%s\n' "${value}"
              printf '%s\n' "${delimiter}"
            } >> "${githubEnvPath}"
          else
            printf '%s=%s\n' "${key}" "${value}" >> "${githubEnvPath}"
          fi
        done <<< "${dotenvKeys}"
