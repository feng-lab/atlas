<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="620" viewBox="0 0 1080 620">
  <style>
    .title { font: 600 22px system-ui, sans-serif; }
    .subtitle { font: 600 16px system-ui, sans-serif; }
    .label { font: 14px system-ui, sans-serif; }
    .small { font: 12px system-ui, sans-serif; }
    .box { fill: #f8fbff; stroke: #2a6fdb; stroke-width: 2; }
    .ghost { fill: #eef2f7; stroke: #9fb5d8; stroke-dasharray: 4 3; }
    /* 3D cube face palettes */
    .pdL0-front { fill: #d3e5ff; stroke: #2a6fdb; }
    .pdL0-top { fill: #e7f1ff; stroke: #2a6fdb; }
    .pdL0-side { fill: #b5d1ff; stroke: #2a6fdb; }

    .pdL1-front { fill: #e6f4ea; stroke: #2aa84a; }
    .pdL1-top { fill: #f1fbf4; stroke: #2aa84a; }
    .pdL1-side { fill: #cce9d6; stroke: #2aa84a; }

    .pdL2-front { fill: #fff2cc; stroke: #d39e00; }
    .pdL2-top { fill: #fff9e5; stroke: #d39e00; }
    .pdL2-side { fill: #f0d890; stroke: #d39e00; }

    .arrow { stroke: #222; stroke-width: 2; marker-end: url(#arrowhead); fill: none; }
    .grid { stroke: #ccd6e5; stroke-width: 1; }
    .brick-front { fill: #bcd4ff; stroke: #356ac3; }
    .brick-top { fill: #d0e2ff; stroke: #356ac3; }
    .brick-side { fill: #a6c2ff; stroke: #356ac3; }
    .pad { fill: none; stroke: #888; stroke-dasharray: 3 2; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#222" />
    </marker>
  </defs>

  <text x="20" y="32" class="title">Multi‑Level Paging System (Concept)</text>

  <!-- Page Directory Packed Across Axes -->
  <rect x="20" y="60" width="360" height="520" class="box"/>
  <text x="30" y="85" class="subtitle">Page Directory (3D logical, packed in 2D view)</text>
  <text x="30" y="105" class="small">m_pageDirectorySize; entries = page‑table block refs; .w = mapped count + 1</text>

  <!-- L0 block in PD (3D) -->
  <!-- parameters for simple isometric effect: dx=14, dy=10 -->
  <g>
    <polygon points="74,130 60,140 170,140 184,130" class="pdL0-top"/>
    <polygon points="170,140 184,130 184,220 170,230" class="pdL0-side"/>
    <rect x="60" y="140" width="110" height="90" class="pdL0-front"/>
  </g>
  <text x="65" y="160" class="label">Level 0 (L0)</text>
  <text x="65" y="180" class="small">PD₀ = ceil(ceil(D/B)/32)</text>

  <!-- L1 offset on second‑longest axis (Y) (3D) -->
  <g>
    <polygon points="74,240 60,250 170,250 184,240" class="pdL1-top"/>
    <polygon points="170,250 184,240 184,295 170,305" class="pdL1-side"/>
    <rect x="60" y="250" width="110" height="45" class="pdL1-front"/>
  </g>
  <text x="65" y="270" class="label">Level 1 (L1)</text>
  <text x="65" y="290" class="small">m_pageDirectoryBases[1].y += PD₀.y</text>

  <!-- L2 offset on longest axis (X) (3D) -->
  <g>
    <polygon points="194,130 180,140 235,140 249,130" class="pdL2-top"/>
    <polygon points="235,140 249,130 249,220 235,230" class="pdL2-side"/>
    <rect x="180" y="140" width="55" height="90" class="pdL2-front"/>
  </g>
  <text x="185" y="160" class="label">L2</text>
  <text x="185" y="180" class="small">m_pageDirectoryBases[2].x += PD₁.x</text>

  <!-- Notes -->
  <text x="30" y="340" class="small">Packing rule (src/atlas/z3dimg.cpp:356–364):</text>
  <text x="30" y="358" class="small">• l=0 at origin</text>
  <text x="30" y="376" class="small">• l=1 offset along 2nd‑longest axis by PD₀</text>
  <text x="30" y="394" class="small">• l≥2 staged along longest axis cumulatively</text>
  <text x="30" y="420" class="small">Max side ≈ 1.5·PD₀ → D_PD_max = B·32·floor(max3D/1.5)</text>

  <!-- Page Table Cache block representation -->
  <rect x="420" y="60" width="300" height="240" class="box"/>
  <text x="430" y="85" class="subtitle">Page Table Cache (3D)</text>
  <text x="430" y="105" class="small">m_pageTableCacheSize = blocks × m_pageTableBlockSize (32³)</text>
  <!-- A block grid to imply sub‑entries -->
  <g transform="translate(430,120)">
    <rect x="0" y="0" width="140" height="120" class="ghost"/>
    <g class="grid">
      <line x1="35" y1="0" x2="35" y2="120"/>
      <line x1="70" y1="0" x2="70" y2="120"/>
      <line x1="105" y1="0" x2="105" y2="120"/>
      <line x1="0" y1="40" x2="140" y2="40"/>
      <line x1="0" y1="80" x2="140" y2="80"/>
    </g>
    <text x="6" y="-6" class="small">page‑table block (cache slot)</text>
  </g>

  <!-- Image Cache Atlas -->
  <rect x="420" y="330" width="640" height="250" class="box"/>
  <text x="430" y="355" class="subtitle">Image Cache (3D Atlas)</text>
  <text x="430" y="375" class="small">m_imageCacheNumBlocks × (B + pad) with pad=(4,4,4)</text>
  <!-- bricks with 3D padding indicated -->
  <g transform="translate(448,398)">
    <!-- pad cube (wireframe look by outline only) -->
    <polygon points="14,-10 0,0 120,0 134,-10" class="pad"/>
    <polygon points="120,0 134,-10 134,70 120,80" class="pad"/>
    <rect x="0" y="0" width="120" height="80" class="pad"/>
    <!-- interior brick cube -->
    <polygon points="22,-4 10,6 114,6 126,-4" class="brick-top"/>
    <polygon points="114,6 126,-4 126,66 114,76" class="brick-side"/>
    <rect x="10" y="6" width="104" height="70" class="brick-front"/>
    <text x="12" y="24" class="small">brick interior (B³)</text>
    <text x="12" y="44" class="small">pad 2 voxels/side</text>
  </g>
  <g transform="translate(612,398)">
    <polygon points="14,-10 0,0 120,0 134,-10" class="pad"/>
    <polygon points="120,0 134,-10 134,70 120,80" class="pad"/>
    <rect x="0" y="0" width="120" height="80" class="pad"/>
    <polygon points="22,-4 10,6 114,6 126,-4" class="brick-top"/>
    <polygon points="114,6 126,-4 126,66 114,76" class="brick-side"/>
    <rect x="10" y="6" width="104" height="70" class="brick-front"/>
  </g>
  <g transform="translate(776,398)">
    <polygon points="14,-10 0,0 120,0 134,-10" class="pad"/>
    <polygon points="120,0 134,-10 134,70 120,80" class="pad"/>
    <rect x="0" y="0" width="120" height="80" class="pad"/>
    <polygon points="22,-4 10,6 114,6 126,-4" class="brick-top"/>
    <polygon points="114,6 126,-4 126,66 114,76" class="brick-side"/>
    <rect x="10" y="6" width="104" height="70" class="brick-front"/>
  </g>

  <!-- Arrows linking PD -> PTC block -> Atlas bricks -->
  <path d="M 170 185 C 320 185, 320 185, 430 185" class="arrow"/>
  <text x="200" y="170" class="small">PD entry → page‑table block</text>

  <path d="M 500 240 C 640 300, 640 300, 640 380" class="arrow"/>
  <text x="650" y="300" class="small">page‑table entry → atlas (xyz)</text>

  <!-- Legend -->
  <g transform="translate(900,60)">
    <rect x="0" y="0" width="160" height="90" class="box"/>
    <text x="10" y="22" class="label">Legend</text>
    <g transform="translate(10,30)">
      <polygon points="4,-4 0,0 20,0 24,-4" class="pdL0-top"/>
      <polygon points="20,0 24,-4 24,12 20,16" class="pdL0-side"/>
      <rect x="0" y="0" width="20" height="12" class="pdL0-front"/>
    </g>
    <text x="36" y="40" class="small">L0 PD tiles</text>
    <g transform="translate(10,50)">
      <polygon points="4,-4 0,0 20,0 24,-4" class="pdL1-top"/>
      <polygon points="20,0 24,-4 24,12 20,16" class="pdL1-side"/>
      <rect x="0" y="0" width="20" height="12" class="pdL1-front"/>
    </g>
    <text x="36" y="60" class="small">L1 PD tiles</text>
    <g transform="translate(10,70)">
      <polygon points="4,-4 0,0 20,0 24,-4" class="pdL2-top"/>
      <polygon points="20,0 24,-4 24,12 20,16" class="pdL2-side"/>
      <rect x="0" y="0" width="20" height="12" class="pdL2-front"/>
    </g>
    <text x="36" y="80" class="small">L2+ PD tiles</text>
  </g>
</svg>
