syntax = "proto3";

package atlas.rpc;

import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/wrappers.proto";
message Empty {}
message Bool { bool ok = 1; }

message PingRequest {}
message PingResponse { bool ok = 1; }

message ObjectInfo {
  uint64 id = 1;
  string type = 2;
  string name = 3;
  string path = 4;
  bool visible = 5;
}

message ListObjectsResponse { repeated ObjectInfo objects = 1; }

// Readiness state for a scene object with respect to the live 3D engine/view.
//
// Notes:
// - This is *not* a guarantee that all underlying data has finished progressive
//   loading (e.g. Neuroglancer volumes). It is intended as a deterministic
//   readiness signal for engine-backed RPCs (bbox/params/camera ops).
enum ObjectLoadState {
  OBJECT_LOAD_STATE_UNSPECIFIED = 0;
  OBJECT_LOAD_STATE_NOT_FOUND = 1;
  OBJECT_LOAD_STATE_DOC_NOT_READY = 2;
  OBJECT_LOAD_STATE_ENGINE_NOT_READY = 3;
  OBJECT_LOAD_STATE_VIEW_NOT_READY = 4;
  OBJECT_LOAD_STATE_READY = 5;
  OBJECT_LOAD_STATE_ERROR = 6;
}

message ObjectStatus {
  uint64 id = 1;
  string type = 2;
  string name = 3;
  string path = 4;
  bool visible = 5;
  ObjectLoadState load_state = 6;
  // Optional 0..1 readiness progress (when available). Omitted when unknown.
  google.protobuf.DoubleValue progress = 7;
  // Optional error summary when load_state=ERROR.
  string error = 8;
}

message GetStatusRequest {
  // When empty and include_all_objects=false, the response omits objects[].
  repeated uint64 ids = 1;
  // When true, include status for all current objects.
  bool include_all_objects = 2;
}

message GetStatusResponse {
  bool ok = 1;
  bool doc_ready = 2;
  bool engine_ready = 3;
  bool has_3d_window = 4;
  repeated ObjectStatus objects = 5;
  string error = 6;
}

message WaitForObjectsReadyRequest {
  repeated uint64 ids = 1;
  // Maximum time to wait before returning (0 = do not wait; check once).
  uint32 timeout_ms = 2;
  // Poll interval while waiting (0 = server default).
  uint32 poll_interval_ms = 3;
}

message WaitForObjectsReadyResponse {
  bool ok = 1; // true when all requested ids are ready
  bool doc_ready = 2;
  bool engine_ready = 3;
  bool has_3d_window = 4;
  repeated ObjectStatus objects = 5; // status snapshot at return time
  string error = 6;
}

// ---- Task/Job API ----
//
// Network-backed operations (e.g. Neuroglancer precomputed) should not block the UI thread.
// The Scene RPC therefore exposes a task API so clients can start a long-running job,
// poll status, wait with a timeout, and cancel/delete tasks explicitly.

message TaskId
{
  uint64 id = 1;
}

enum TaskState
{
  TASK_STATE_UNSPECIFIED = 0;
  TASK_STATE_QUEUED = 1;
  TASK_STATE_RUNNING = 2;
  TASK_STATE_SUCCEEDED = 3;
  TASK_STATE_FAILED = 4;
  TASK_STATE_CANCELLED = 5;
}

message LoadTaskRequest
{
  // Sources to load. Supports:
  // - local file paths
  // - Neuroglancer precomputed dataset URLs (precomputed://, gs://, s3://, http(s)://)
  repeated string sources = 1;

  // Timeout for network metadata fetch (e.g. precomputed .../info) per dataset.
  // 0 means server default.
  uint32 network_timeout_ms = 2;

  // When true, ensure loaded objects are visible after loading.
  // This matches the typical user workflow ("load then see it").
  bool set_visible = 3;
}

message LoadTaskResult
{
  repeated uint64 loaded_ids = 1;
  repeated ObjectInfo objects = 2; // snapshot after load completes
  repeated string warnings = 3;
}

message TaskStatus
{
  uint64 id = 1;
  string kind = 2; // e.g. "load"
  TaskState state = 3;
  google.protobuf.DoubleValue progress = 4; // optional 0..1
  string message = 5;
  string error = 6; // populated when state=FAILED

  oneof result
  {
    LoadTaskResult load = 10;
  }
}

message WaitTaskRequest
{
  uint64 task_id = 1;
  // Maximum time to wait before returning (0 = do not wait; return current status).
  uint32 timeout_ms = 2;
  // Poll interval while waiting (0 = server default).
  uint32 poll_interval_ms = 3;
}

message StartTaskResponse
{
  bool ok = 1;
  uint64 task_id = 2;
  string error = 3;
}

message BBoxRequest { repeated uint64 ids = 1; bool after_clipping = 2; }
message Vec3 { double x = 1; double y = 2; double z = 3; }
message BBox { Vec3 min = 1; Vec3 max = 2; Vec3 size = 3; Vec3 center = 4; }
message BBoxResponse { BBox bbox = 1; }

message CapabilitiesRequest { repeated uint64 ids = 1; }
message Parameter {
  string json_key = 1;
  string name = 2;
  string type = 3;
  bool supports_interpolation = 4;
  // Optional: human-readable description for LLMs/UIs
  string description = 16;
  // Canonical JSON Schema for the parameter's value shape and constraints.
  // Populated from ZParameter::valueSchema().
  google.protobuf.Struct value_schema = 17;
}
message ParamList { repeated Parameter params = 1; }
message CapabilitiesResponse {
  // Camera (id=0) parameter schema
  repeated Parameter camera = 5;
  repeated Parameter background = 1;
  repeated Parameter axis = 2;
  repeated Parameter global = 3;
  map<string, ParamList> objects = 4;
}

message EnsureAnimationRequest {
  // When true, always create a new Animation3D (even if one already exists).
  bool create_new = 1;
  // Optional name for a newly created Animation3D.
  string name = 2;
}

message EnsureAnimationResponse {
  bool ok = 1;
  uint64 animation_id = 2;
  bool created = 3;
  string error = 4;
}

message SetDurationRequest {
  uint64 animation_id = 1;
  double duration = 2;
}

message SetKeyRequest {
  uint64 animation_id = 1; // Animation3D object id
  uint64 target_id = 2;    // 0=camera, 1=background, 2=axis, 3=global, >=4=object id
  string json_key = 3;     // non-camera only
  double time = 4;         // seconds
  string easing = 5;       // e.g., "Linear", "InOutSine"
  google.protobuf.Value value = 6; // typed JSON value payload (camera: object; params: number/bool/string/array)
}

// Query keys present in the current animation for a specific target
message ListKeysRequest {
  uint64 animation_id = 1; // Animation3D object id
  uint64 target_id = 2;    // 0=camera, >=4 object id
  string json_key = 3;     // required for non-camera scope; ignored for camera
  bool include_values = 4; // when true, include value_json for each key
}

message KeyInfo {
  double time = 1;
  string type = 2;        // parameter type, e.g., "Vec4", "3DCamera"
  string value_json = 3;  // present when include_values=true; empty otherwise
}

message KeysResponse { repeated KeyInfo keys = 1; }

service Scene {
  rpc Ping (PingRequest) returns (PingResponse);
  // Return the installation root of the running Atlas instance (for locating
  // bundled schemas/docs/protos). On macOS this is the .app bundle root.
  rpc GetAppLocation (google.protobuf.Empty) returns (google.protobuf.StringValue);
  // Return a build/version identifier for the running Atlas instance.
  // Intended for agent compatibility checks and session logs.
  rpc GetAppVersion (google.protobuf.Empty) returns (google.protobuf.StringValue);
  // Returns ok=true when the 3D rendering engine is initialized and ready.
  rpc EngineReady (Empty) returns (Bool);
  // Ensure a 3D window/canvas is open so the rendering engine can initialize.
  rpc Ensure3DWindow (Empty) returns (Bool);
  // Resize the live 3D canvas in logical Qt pixels and return the actual
  // logical and physical size after layout.
  rpc Set3DCanvasSize(Set3DCanvasSizeRequest) returns (Set3DCanvasSizeResponse);
  // Return basic readiness state for the RPC server, document, and 3D engine.
  // Optionally includes per-object readiness (view bound) for deterministic tool use.
  rpc GetStatus (GetStatusRequest) returns (GetStatusResponse);
  // Wait until the requested object ids are ready for engine-backed operations
  // (i.e. the object has a bound 3D view/filter), or until timeout.
  rpc WaitForObjectsReady (WaitForObjectsReadyRequest) returns (WaitForObjectsReadyResponse);
  // ---- Task/Job API ----
  // Start an async load task (local paths and/or Neuroglancer precomputed URLs).
  rpc StartLoadTask(LoadTaskRequest) returns (StartTaskResponse);
  // Poll task status (non-blocking).
  rpc GetTaskStatus(TaskId) returns (TaskStatus);
  // Wait for task completion (with optional timeout).
  rpc WaitTask(WaitTaskRequest) returns (TaskStatus);
  // Best-effort cancellation.
  rpc CancelTask(TaskId) returns (Bool);
  // Forget a task and release its stored results.
  rpc DeleteTask(TaskId) returns (Bool);
  rpc ListObjects (Empty) returns (ListObjectsResponse);
  rpc BBox (BBoxRequest) returns (BBoxResponse);
  rpc Capabilities (CapabilitiesRequest) returns (CapabilitiesResponse);
  // Scene (stateless) parameter operations
  // Validate a list of scene parameter assignments without applying them.
  rpc ValidateSceneParams (ValidateSceneParamsRequest) returns (ValidateSceneParamsResponse);
  // Apply a list of scene parameter assignments atomically (no timeline/time/easing).
  rpc ApplySceneParams (ApplySceneParamsRequest) returns (Bool);
  // Read current parameter values for a target scope.
  rpc GetParamValues (GetParamValuesRequest) returns (GetParamValuesResponse);
  // Save current scene (.scene)
  rpc SaveScene (SaveSceneRequest) returns (Bool);
  // Render a single-frame screenshot of the current 3D scene (no animation export).
  // Returns the written image path (typically in the OS temp directory unless a path is provided).
  rpc TakeScreenshot3D (ScreenshotRequest) returns (ScreenshotResponse);
  rpc EnsureAnimation (EnsureAnimationRequest) returns (EnsureAnimationResponse);
  rpc SetDuration (SetDurationRequest) returns (Bool);
  rpc SetKey (SetKeyRequest) returns (Bool);
  // Camera helpers
  // Return the current engine camera as a typed value (does not write keys).
  rpc CameraGet (google.protobuf.Empty) returns (CameraKeysResponse);
  rpc CameraFit (CameraFitRequest) returns (CameraKeysResponse);
  rpc CameraOrbitSuggest (CameraOrbitSuggestRequest) returns (CameraKeysResponse);
  rpc CameraDollySuggest (CameraDollySuggestRequest) returns (CameraKeysResponse);
  // Camera operator helpers (deterministic, UI-parity)
  rpc CameraFocus (CameraFocusRequest) returns (CameraKeysResponse);
  rpc CameraPointTo (CameraPointToRequest) returns (CameraKeysResponse);
  rpc CameraRotate (CameraRotateRequest) returns (CameraKeysResponse);
  rpc CameraResetView (CameraResetViewRequest) returns (CameraKeysResponse);
  // Camera navigation helpers (freeform walkthrough building blocks)
  rpc CameraMoveLocal (CameraMoveLocalRequest) returns (CameraKeysResponse);
  rpc CameraLookAt (CameraLookAtRequest) returns (CameraKeysResponse);
  // Waypoint-based camera path planning (returns typed keys; does not write keys).
  rpc CameraPathSolve (CameraPathSolveRequest) returns (CameraSolveResponse);
  // New typed camera planning and validation
  rpc CameraSolve (CameraSolveRequest) returns (CameraSolveResponse);
  rpc CameraValidate (CameraValidateRequest) returns (CameraValidateResponse);
  // Sample the evaluated camera value(s) from an Animation3D at specific time(s),
  // without mutating the engine time or writing keys.
  rpc CameraSample(CameraSampleRequest) returns (CameraSampleResponse);
  rpc FitCandidates (Empty) returns (FitCandidatesResponse);
  // Scene state helpers
  rpc SetVisibility (VisibilityRequest) returns (Bool);
  // Remove objects from the document (no save/discard prompts; intended for automation).
  rpc RemoveObjects (RemoveObjectsRequest) returns (Bool);
  // Create aliases for existing objects (shared backing data, independent view params)
  rpc MakeAlias (MakeAliasRequest) returns (MakeAliasResponse);
  // Scene cuts (global axis-aligned box or plane set)
  rpc CutSet (CutSetRequest) returns (Bool);
  rpc CutClear (Empty) returns (Bool);
  rpc CutSuggest (CutSuggestRequest) returns (CutSuggestion);
  // Parameter enumeration for a target scope
  rpc ListParams (ListParamsRequest) returns (ParamList);
  // Timeline/keyframe ops
  rpc ClearKeys (ClearKeysRequest) returns (Bool);
  rpc RemoveKey (RemoveKeyRequest) returns (Bool);
  rpc Batch (BatchRequest) returns (Bool);
  rpc SetTime (SetTimeRequest) returns (Bool);
  // Capture a full-scene keyframe (UI "Save Key Frame" parity): writes keys for
  // all parameters (including camera) at the requested time.
  rpc AddKeyFrame(AddKeyFrameRequest) returns (Bool);
  // Camera animation settings (timeline)
  rpc SetCameraInterpolationMethod (SetCameraInterpolationMethodRequest) returns (Bool);
  rpc GetCameraInterpolationMethod (GetCameraInterpolationMethodRequest) returns (google.protobuf.StringValue);
  // Save/export
  // Save current animation to .animation3d
  rpc SaveAnimation (SaveAnimationRequest) returns (Bool);
  // Introspection
  rpc ListKeys (ListKeysRequest) returns (KeysResponse);
  rpc GetTime (GetTimeRequest) returns (TimeStatus);
}

// Scene (stateless) parameter messages
message SetParam {
  uint64 id = 1;                  // 0=camera, 1=background, 2=axis, 3=global, >=4=object id
  string json_key = 2;            // canonical parameter json key
  google.protobuf.Value value = 3; // value to set (typed JSON)
}

message ApplySceneParamsRequest { repeated SetParam set_params = 1; }

message ValidateSceneParamsRequest { repeated SetParam set_params = 1; }

message ValidateSceneParamResult {
  string json_key = 1;
  bool ok = 2;                                  // assignment is acceptable
  google.protobuf.Value normalized_value = 3;   // when ok=true, may contain clamped/normalized value
  string reason = 4;                            // when ok=false, short reason (e.g., "json_key_not_found", "type_mismatch", "option_invalid")
}

message ValidateSceneParamsResponse {
  repeated ValidateSceneParamResult results = 1;
  bool ok = 2; // all assignments acceptable
}

message GetParamValuesRequest {
  uint64 id = 1;                 // 0=camera, 1=background, 2=axis, 3=global, >=4=object id
  repeated string json_keys = 2; // when empty, returns all values for the scope
}

message GetParamValuesResponse {
  map<string, google.protobuf.Value> values = 1; // json_key -> value
}

message SaveSceneRequest { string path = 1; }

// Screenshot / preview rendering (single frame; current scene state)
message ScreenshotRequest {
  uint32 width = 1;
  uint32 height = 2;
  // Optional output path. When empty, Atlas chooses a temp file path.
  string path = 3;
  // When false and the output file already exists, the call fails.
  bool overwrite = 4;
}

message ScreenshotResponse {
  bool ok = 1;
  string path = 2;
  string error = 3;
}

message Set3DCanvasSizeRequest
{
  // Requested live 3D canvas size in logical Qt pixels. On HiDPI displays the
  // actual physical render size is logical_size * device_pixel_ratio.
  uint32 logical_width = 1;
  uint32 logical_height = 2;
}

message Set3DCanvasSizeResponse
{
  bool ok = 1;
  uint32 logical_width = 2;
  uint32 logical_height = 3;
  uint32 physical_width = 4;
  uint32 physical_height = 5;
  string error = 6;
}

// Camera helper messages
message CameraFitRequest {
  repeated uint64 ids = 1; // empty → use all objects
  bool all = 2;            // override ids and use all objects
  bool after_clipping = 3; // derive bbox after clipping
  double min_radius = 4;   // optional minimum radius constraint (world units)
}

message CameraKeysResponse { repeated google.protobuf.Value values = 1; }

message CameraOrbitSuggestRequest {
  repeated uint64 ids = 1; // targets to derive center/radius (or empty → all)
  string axis = 2;         // one of: "x", "y", "z"
  double degrees = 3;      // default 360
}

message CameraDollySuggestRequest {
  repeated uint64 ids = 1; // targets to derive center (or empty → all)
  double start_dist = 2;   // distance from center at start
  double end_dist = 3;     // distance from center at end
}

// Camera operator messages
message CameraFocusRequest {
  repeated uint64 ids = 1; // targets to focus on (Animation3D filtered). Empty → all visual objects
  bool after_clipping = 2;     // when true, use bbox after clipping
  double min_radius = 3;       // minimum radius (world units) for focus sphere (optional)
}

message CameraPointToRequest {
  repeated uint64 ids = 1; // targets to point to (Animation3D filtered). Empty → all visual objects
  bool after_clipping = 2;     // when true, use bbox after clipping
}

message CameraRotateRequest {
  string op = 1;                // "AZIMUTH"|"ELEVATION"|"ROLL"|"YAW"|"PITCH"|"FLIP"
  double degrees = 2;           // used for rotation ops (ignored for FLIP)
  google.protobuf.Value base_value =
    3; // required: apply op to this typed camera value (no implicit engine camera fallback)
}

message CameraResetViewRequest {
  string mode = 1;              // "XY"|"XZ"|"YZ"|"RESET"
  repeated uint64 ids = 2;      // optional subset to derive bbox (Animation3D filtered). Empty → all visual objects
  bool after_clipping = 3;      // when true, use bbox after clipping
  double min_radius = 4;        // optional minimum radius for RESET/XY
}

// Camera navigation and path planning
message CameraMoveLocalRequest {
  string op = 1;      // "FORWARD"|"BACK"|"RIGHT"|"LEFT"|"UP"|"DOWN"
  double distance = 2; // world-units, or a fraction when distance_is_fraction_of_bbox_radius=true
  bool distance_is_fraction_of_bbox_radius = 3; // when true, distance is scaled by bbox enclosing-sphere radius
  repeated uint64 ids = 4; // optional targets for bbox scale (Animation3D filtered). Empty → all visual objects
  bool after_clipping = 5; // when true, derive bbox after clipping (only used when scaling distance)
  bool move_center = 6; // when true, translate eye+center together (fly). When false, translate eye only (dolly/boom)
  google.protobuf.Value base_value =
    7; // required: move from this typed camera value (no implicit engine camera fallback)
}

message CameraLookAtRequest {
  google.protobuf.Value base_value =
    1; // required: aim from this typed camera value (no implicit engine camera fallback)
  oneof target {
    Vec3 world_point = 2;        // camera center will point here
    bool target_bbox_center = 3; // when set, use bbox center of ids (or all objects)
    Vec3 bbox_fraction_point = 4; // [0..1] fractions inside the bbox of ids (or all objects)
  }
  repeated uint64 ids = 5; // optional targets for bbox computations (Animation3D filtered). Empty → all visual objects
  bool after_clipping = 6; // when true, derive bbox after clipping
}

message CameraWaypoint {
  double time = 1; // key time in seconds
  oneof eye {
    Vec3 world_eye = 2;         // absolute world-space eye position
    Vec3 bbox_fraction_eye = 3; // [0..1] fractions inside bbox of ids
  }
  oneof look_at {
    Vec3 world_look_at = 4;        // absolute world-space look-at point (camera center)
    bool look_at_bbox_center = 5;  // when set, look at bbox center of ids
    Vec3 bbox_fraction_look_at = 6; // [0..1] fractions inside bbox of ids
  }
}

message CameraPathSolveRequest {
  repeated uint64 ids = 1; // targets for bbox computations (Animation3D filtered). Empty → all visual objects
  bool after_clipping = 2; // when true, derive bbox after clipping
  google.protobuf.Value base_value = 3; // required: base camera for fov/projection/up defaults
  repeated CameraWaypoint waypoints = 4; // at least 2 waypoints recommended
}

// Typed camera planning and validation
message CameraConstraints {
  bool keep_visible = 1;   // default true
  double margin = 2;       // optional margin (fraction of bbox size); default 0.0
  // Minimum on-screen coverage of the target bbox (0..1). This is a *screen-space* framing
  // metric (not a distance ratio): higher values push toward tighter framing (larger subjects).
  // The validator reports the measured value as CameraValidateResult.frame_coverage.
  // Set to 0.0 to disable the constraint.
  double min_frame_coverage = 3; // default 0.0
}

// Solve camera keys for a mode and targets
message CameraSolveRequest {
  string mode = 1;           // "FIT" | "ORBIT" | "DOLLY" | "STATIC" (case-insensitive)
  repeated uint64 ids = 2; // targets; server filters non-visual by default. Empty → all visual objects
  double t0 = 3;             // first key time
  double t1 = 4;             // second key time (for ORBIT/DOLLY); ignored for FIT/STATIC
  CameraConstraints constraints = 5;
  google.protobuf.Struct params = 6; // per-mode params: ORBIT{axis,degrees}, DOLLY{start_dist,end_dist}
}

message CameraSolveKey { double time = 1; google.protobuf.Value value = 2; }
message CameraSolveResponse { repeated CameraSolveKey keys = 1; }

message CameraPolicies {
  // Allow the validator to suggest a new camera value by changing the camera's
  // distance to its center (a "dolly" along the view direction). This keeps the
  // camera look-at point fixed and does not change the field of view.
  bool adjust_distance = 1;
}

message CameraValidateRequest {
  repeated uint64 ids = 1; // targets; server filters non-visual by default. Empty → all visual objects
  repeated double times = 2;               // times corresponding to values
  repeated google.protobuf.Value values = 3; // typed camera values
  CameraConstraints constraints = 4;
  CameraPolicies policies = 5;
  // Optional: when values are missing, sample the camera from this Animation3D at each time.
  uint64 animation_id = 6;
}

message CameraValidateResult {
  double time = 1;
  bool within_frame = 2;
  // Screen-space coverage of the target bbox (0..1). Higher means the target appears larger
  // on screen (tighter framing).
  double frame_coverage = 3;
  bool adjusted = 4;
  google.protobuf.Value adjusted_value = 5; // present when adjusted=true
  string reason = 6; // e.g., "outside_frame", "coverage_below_threshold"
}

message CameraValidateResponse {
  repeated CameraValidateResult results = 1;
  bool ok = 2; // all results within constraints
}

message CameraSampleRequest
{
  uint64 animation_id = 1; // required: Animation3D id to sample from
  repeated double times = 2; // required: one or more sample times (seconds)
}

message CameraSampleKey
{
  double time = 1;
  google.protobuf.Value value = 2; // typed camera value at time
}

message CameraSampleResponse
{
  repeated CameraSampleKey samples = 1;
}

message FitCandidatesResponse { repeated uint64 ids = 1; }

// Scene state
message VisibilityRequest {
  repeated uint64 ids = 1;
  bool on = 2;
}

message RemoveObjectsRequest {
  repeated uint64 ids = 1;
  // When false (default), the request fails if any object has unsaved changes.
  // When true, removal discards unsaved changes without prompting.
  bool allow_unsaved = 2;
}

// Aliases (per-object)
message MakeAliasRequest {
  // Source object ids to alias. Each id that supports aliasing will produce a new alias id.
  repeated uint64 ids = 1;
}

message MakeAliasResult {
  uint64 src_id = 1;   // original object id
  uint64 alias_id = 2; // newly created alias id
}

message MakeAliasResponse {
  bool ok = 1;
  // One entry per successfully created alias.
  repeated MakeAliasResult aliases = 2;
  // Optional summary when ok=false (e.g., invalid ids or unsupported types).
  string error = 3;
}

// Cuts
message Plane { double a = 1; double b = 2; double c = 3; double d = 4; }
message CutPlanes { repeated Plane planes = 1; }
message CutSetRequest {
  oneof cut {
    BBox box = 1;       // axis-aligned world-space box
    CutPlanes planes = 2; // plane equations ax+by+cz+d=0
  }
  bool refit_camera = 3;   // when true, re-fit camera after applying cuts
}
message CutSuggestRequest {
  repeated uint64 ids = 1; // if empty, use all visual objects
  string mode = 2;         // "box" (current implementation); reserved for future modes
  double margin = 3;       // world-units to expand the suggested box
  bool after_clipping = 4; // suggest using bbox after clipping
}
message CutSuggestion {
  oneof cut {
    BBox box = 1;
    CutPlanes planes = 2;
  }
}

// Parameter enumeration for a target id (0=camera,1=background,2=axis,3=global,≥4=object id)
message ListParamsRequest { uint64 id = 1; }

// Keyframe ops (Animation3D object id + per-track operations)
message ClearKeysRequest {
  uint64 animation_id = 1;
  uint64 target_id = 2;
  string json_key = 3;
}
message RemoveKeyRequest {
  uint64 animation_id = 1;
  uint64 target_id = 2;
  string json_key = 3;
  double time = 4;
}

message BatchSetKey {
  uint64 target_id = 1;
  string json_key = 2;
  double time = 3;
  string easing = 4;
  google.protobuf.Value value = 5;
}
message BatchRemoveKey {
  uint64 target_id = 1;
  string json_key = 2;
  double time = 3;
}
message BatchRequest {
  uint64 animation_id = 1;
  repeated BatchSetKey set_keys = 2;
  repeated BatchRemoveKey remove_keys = 3;
  bool commit = 4;
}

// Playback controls
message SetTimeRequest {
  uint64 animation_id = 1;
  double seconds = 2;
  bool cancel_rendering = 3;
}

// Capture a global keyframe for all objects/parameters (UI parity).
// This is not the same as SetKey/Batch (per-track); it snapshots the current
// scene state into the timeline at the given time.
message AddKeyFrameRequest
{
  uint64 animation_id = 1;
  double time = 2;
  // When true, cancels any in-progress long rendering before applying time.
  bool cancel_rendering = 3;
}

// Camera animation settings
message SetCameraInterpolationMethodRequest {
  uint64 animation_id = 1;
  string method = 2; // "Center" | "Position Spline" | "Position Rotation Spline" (case-insensitive)
}

message GetCameraInterpolationMethodRequest { uint64 animation_id = 1; }

// Save animation
message SaveAnimationRequest {
  uint64 animation_id = 1;
  string path = 2;
}

message GetTimeRequest { uint64 animation_id = 1; }

// Time status
message TimeStatus { double seconds = 1; double duration = 2; }
